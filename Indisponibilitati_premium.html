<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indisponibilitati</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background:
    radial-gradient(circle at top center, rgba(170,120,20,0.55) 0%, rgba(35,24,8,0.95) 30%, #030303 72%),
    linear-gradient(180deg, #080808 0%, #000 100%);
  color: #f2c94c;
}

.header {
  display: flex;
  align-items: center;
  padding: 15px;
}

.back-btn {
  margin-right: 15px;
  font-size: 24px;
  cursor: pointer;
  color: #f2c94c;
}

.title {
  font-size: 22px;
  font-weight: 700;
}

.type-row {
  display: flex;
  gap: 10px;
  padding: 15px;
}

.type-btn {
  flex: 1;
  text-align: center;
  padding: 12px 6px;
  border: 1px solid #f2c94c;
  color: #f2c94c;
  border-radius: 10px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  background: rgba(12, 24, 38, 0.82);
}

.type-btn.active {
  background: #f2c94c;
  color: #000;
}

.section {
  padding: 12px 15px;
}

.section-title {
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 10px;
}

.days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 7px;
}

.day-btn {
  border: 1px solid #f2c94c;
  border-radius: 10px;
  padding: 8px 4px;
  text-align: center;
  cursor: pointer;
  color: #f2c94c;
  background: rgba(12, 24, 38, 0.82);
}

.day-btn.active {
  background: #f2c94c;
  color: #000;
}

.day-name {
  font-size: 13px;
  font-weight: 700;
}

.day-date {
  font-size: 11px;
  margin-top: 3px;
}

.time-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px;
}

.time-btn {
  border: 1px solid #f2c94c;
  border-radius: 10px;
  padding: 10px 4px;
  text-align: center;
  cursor: pointer;
  color: #f2c94c;
  background: rgba(12, 24, 38, 0.82);
  font-size: 13px;
  font-weight: 700;
}

.time-btn.active {
  background: #f2c94c;
  color: #000;
}

.time-btn.occupied {
  background: rgba(0,0,0,0.50);
  color: rgba(242,201,76,0.35);
  border-color: rgba(242,201,76,0.22);
  cursor: not-allowed;
}

.field {
  width: 100%;
  border: 1px solid #f2c94c;
  border-radius: 12px;
  background: rgba(12, 24, 38, 0.82);
  color: #fff;
  padding: 11px;
  font-size: 15px;
  outline: none;
}

textarea.field {
  min-height: 80px;
  resize: none;
}

.summary-box {
  border: 1px solid rgba(242,201,76,0.75);
  border-radius: 12px;
  padding: 12px;
  color: #fff;
  background: rgba(12, 24, 38, 0.70);
  font-size: 14px;
  line-height: 1.5;
}

.save-wrap {
  padding: 15px;
}

.save-btn {
  background: linear-gradient(145deg, #f6d257, #a96f10);
  color: #000;
  text-align: center;
  padding: 15px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  font-weight: 900;
}

/* ===== POPUP PREMIUM MESAJE ===== */
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.78);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10000;
  padding: 20px;
}

.popup-overlay.show {
  display: flex;
}

.popup-box {
  width: 100%;
  max-width: 330px;
  border-radius: 20px;
  border: 2px solid #f2c94c;
  background: linear-gradient(180deg, #121212 0%, #050505 100%);
  box-shadow: 0 0 35px rgba(242,201,76,0.25);
  padding: 22px 18px;
  text-align: center;
}

.popup-icon {
  font-size: 48px;
  font-weight: 900;
  margin-bottom: 10px;
}

.popup-icon.ok {

}

.popup-icon.error {
  color: #ff4040;
}

.popup-text {
  color: #ffffff;
  font-size: 20px;
  font-weight: 900;
  line-height: 1.25;
}

.popup-text.ok {
  color: #58d45f;
}

.popup-text.error {
  color: #ff4040;
}

.popup-ok-btn {
  margin-top: 20px;
  width: 100%;
  height: 50px;
  border: none;
  border-radius: 15px;
  background: linear-gradient(145deg, #f6d257, #a96f10);
  color: #111;
  font-size: 18px;
  font-weight: 900;
  cursor: pointer;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = window.supabase.createClient(
  'https://ksdcstrnsnqvqyyitcol.supabase.co',
  'sb_publishable_TDzH5gP2zi9jwmUVLlWrQA_p4TiPTZ_'
);


/* BLOC POPUP PREMIUM - MESAJE FĂRĂ ALERT BROWSER */
function afiseazaPopupPremium(text, tip) {
  const popup = document.getElementById('premiumPopup');
  const icon = document.getElementById('premiumPopupIcon');
  const mesaj = document.getElementById('premiumPopupText');

  if (!popup || !icon || !mesaj) return;

  const esteOk = tip === 'ok';

  icon.className = 'popup-icon ' + (esteOk ? 'ok' : 'error');
  mesaj.className = 'popup-text ' + (esteOk ? 'ok' : 'error');

  icon.textContent = esteOk ? '✓' : '!';
  mesaj.textContent = text || '';

  popup.classList.add('show');
}

function inchidePopupPremium() {
  const popup = document.getElementById('premiumPopup');
  if (popup) popup.classList.remove('show');
}

function salvatSiInapoi() {
  afiseazaPopupPremium('Salvat', 'ok');
  setTimeout(function() {
    window.location.href = 'index_premium.html';
  }, 700);
}


let selectedType = 'interval';
let selectedDate = null;
let selectedStart = null;
let selectedEnd = null;
let concediuStart = null;
let concediuEnd = null;
let oreOcupateZiSelectata = [];

/* CONTEXT AGENDA PERSONALĂ */
let agendaContext = null;

function setActiveType(type) {
  selectedType = type;

  document.querySelectorAll('.type-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });

  if (type === 'interval') {
    document.getElementById('btnInterval').classList.add('active');
    document.getElementById('intervalArea').style.display = 'block';
    document.getElementById('dayArea').style.display = 'none';
    document.getElementById('concediuArea').style.display = 'none';
  }

  if (type === 'zi') {
    document.getElementById('btnZi').classList.add('active');
    document.getElementById('intervalArea').style.display = 'block';
    document.getElementById('dayArea').style.display = 'none';
    document.getElementById('concediuArea').style.display = 'none';

    selectedStart = '08:00';
    selectedEnd = '22:00';

    document.querySelectorAll('.time-btn').forEach(function(btn) {
      btn.classList.add('active');
    });
  }

  if (type === 'concediu') {
    document.getElementById('btnConcediu').classList.add('active');
    document.getElementById('intervalArea').style.display = 'none';
    document.getElementById('dayArea').style.display = 'none';
    document.getElementById('concediuArea').style.display = 'block';

    selectedDate = null;
    selectedStart = '08:00';
    selectedEnd = '22:00';
  }

  updateSummary();
}

function buildDays() {
  const box = document.getElementById('daysGrid');
  const days = ['Du', 'Lu', 'Ma', 'Mi', 'Jo', 'Vi', 'Sa'];
  const months = ['Ian', 'Feb', 'Mar', 'Apr', 'Mai', 'Iun', 'Iul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];

  box.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);

    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const value = yyyy + '-' + mm + '-' + dd;

    const btn = document.createElement('div');
    btn.className = 'day-btn';
    btn.dataset.date = value;
    btn.innerHTML = '<div class="day-name">' + days[d.getDay()] + '</div><div class="day-date">' + d.getDate() + ' ' + months[d.getMonth()] + '</div>';
    btn.addEventListener('click', function() {
      selectDay(btn, value);
    });

    box.appendChild(btn);
  }
}

async function selectDay(el, dateValue) {
  document.querySelectorAll('.day-btn').forEach(function(btn) {
    btn.classList.remove('active');
  });

  el.classList.add('active');
  selectedDate = dateValue;

  await incarcaOreOcupatePentruZi(dateValue);

  updateSummary();
}

function buildTimes() {
  const box = document.getElementById('timeGrid');
  box.innerHTML = '';

  for (let h = 8; h <= 22; h++) {

    const time = String(h).padStart(2, '0') + ':00';

    const btn = document.createElement('div');
    btn.className = 'time-btn';
    btn.dataset.time = time;
    btn.textContent = time;
    btn.addEventListener('click', function() {
      selectTime(btn, time);
    });

    box.appendChild(btn);
  }
}


async function incarcaOreOcupatePentruZi(dateValue) {
  oreOcupateZiSelectata = [];

  if (!dateValue) return;

  /* ===== PROGRAMARI BUSINESS ===== */
  const { data: programari, error: errorProgramari } = await supabaseClient
    .from('programari')
    .select('ora_start, ora_final, status')
    .eq('data', dateValue);

  if (!errorProgramari) {
    (programari || []).forEach(function(p) {

      if (p.status === 'stearsa') return;

      oreOcupateZiSelectata.push({
        start: String(p.ora_start || '').slice(0,5),
        final: String(p.ora_final || '').slice(0,5)
      });
    });
  }

  /* ===== BLOCARI EXISTENTE / PERSONAL ===== */
  const { data: blocari, error: errorBlocari } = await supabaseClient
    .from('indisponibilitati')
    .select('ora_start, ora_final, data_start, data_final, activa, tip_special')
    .eq('activa', true);

  if (!errorBlocari) {
    (blocari || []).forEach(function(b) {

      const dataStart = String(b.data_start || '');
      const dataFinal = String(b.data_final || dataStart);

      if (dateValue < dataStart || dateValue > dataFinal) return;

      oreOcupateZiSelectata.push({
        start: String(b.ora_start || '08:00').slice(0,5),
        final: String(b.ora_final || '22:00').slice(0,5)
      });
    });
  }

  updateTimesOccupied();
}

function timeToMinutes(t) {
  if (!t || t.indexOf(':') === -1) return 0;
  const parti = t.split(':');
  return Number(parti[0]) * 60 + Number(parti[1]);
}

function oraEsteOcupata(timeValue) {

  const minuteCurente = timeToMinutes(timeValue);

  return oreOcupateZiSelectata.some(function(p) {

    if (!p.start || !p.final) return false;

    const startMinute = timeToMinutes(p.start);
    const finalMinute = timeToMinutes(p.final);

    return minuteCurente >= startMinute && minuteCurente < finalMinute;
  });
}

function updateTimesOccupied() {

  document.querySelectorAll('.time-btn').forEach(function(btn) {

    btn.classList.remove('occupied');

    const time = btn.dataset.time;

    if (oraEsteOcupata(time)) {
      btn.classList.add('occupied');
    }
  });
}


function selectTime(el, timeValue) {

  if (el.classList.contains('occupied')) {
    return;
  }
  if (!selectedStart || (selectedStart && selectedEnd)) {
    selectedStart = timeValue;
    selectedEnd = null;

    document.querySelectorAll('.time-btn').forEach(function(btn) {
      btn.classList.remove('active');
    });

    el.classList.add('active');
    updateSummary();
    return;
  }

  selectedEnd = timeValue;

  if (selectedEnd <= selectedStart) {
    afiseazaPopupPremium('Ora finală trebuie să fie după ora de start', 'error');
    selectedEnd = null;
    return;
  }

  document.querySelectorAll('.time-btn').forEach(function(btn) {
    const t = btn.dataset.time;
    if (t >= selectedStart && t <= selectedEnd) {
      btn.classList.add('active');
    }
  });

  updateSummary();
}

function updateSummary() {
  let tipText = 'Interval';
  if (selectedType === 'zi') tipText = 'Zi întreagă';
  if (selectedType === 'concediu') tipText = 'Concediu';

  if (selectedType === 'concediu') {
    document.getElementById('summaryBox').innerHTML =
      'Tip: ' + tipText + '<br>De la: ' + (concediuStart || '-') + '<br>Până la: ' + (concediuEnd || '-');
    return;
  }

  document.getElementById('summaryBox').innerHTML =
    'Tip: ' + tipText + '<br>Zi: ' + (selectedDate || '-') + '<br>Interval: ' + (selectedStart || '-') + ' - ' + (selectedEnd || '-');
}

async function saveData() {
  const mesaj = '';

  if (selectedType === 'concediu') {
    concediuStart = document.getElementById('concediuStart').value;
    concediuEnd = document.getElementById('concediuEnd').value;

    if (!concediuStart || !concediuEnd) {
      afiseazaPopupPremium('Selectează perioada concediului', 'error');
      return;
    }

    if (concediuEnd < concediuStart) {
      afiseazaPopupPremium('Data finală trebuie să fie după data de început', 'error');
      return;
    }

    const { data: blocariConcediu, error: errorBlocariConcediu } = await supabaseClient
      .from('indisponibilitati')
      .select('*')
      .eq('activa', true)
      .lte('data_start', concediuEnd)
      .gte('data_final', concediuStart);

    if (errorBlocariConcediu) {
      console.log('EROARE VERIFICARE CONCEDIU:', errorBlocariConcediu);
      afiseazaPopupPremium('Eroare verificare concediu', 'error');
      return;
    }

    if ((blocariConcediu || []).length > 0) {
      afiseazaPopupPremium('Există deja o blocare în perioada aleasă', 'error');
      return;
    }

    const { data: programariConcediu, error: errorProgramariConcediu } = await supabaseClient
      .from('programari')
      .select('*')
      .gte('data', concediuStart)
      .lte('data', concediuEnd);

    if (errorProgramariConcediu) {
      console.log('EROARE VERIFICARE PROGRAMARI CONCEDIU:', errorProgramariConcediu);
      afiseazaPopupPremium('Eroare verificare programări', 'error');
      return;
    }

    const existaProgramareConcediu = (programariConcediu || []).some(function(p) {
      return p.status !== 'stearsa';
    });

    if (existaProgramareConcediu) {
      afiseazaPopupPremium('Există deja programări în perioada aleasă', 'error');
      return;
    }

    const { error } = await supabaseClient
      .from('indisponibilitati')
      .insert([{
        tip: 'concediu',
        data_start: concediuStart,
        data_final: concediuEnd,
        ora_start: '08:00',
        ora_final: '22:00',
        mesaj: mesaj || 'Concediu',
        activa: true
      }]);

    if (error) {
      console.log('EROARE SUPABASE CONCEDIU:', error);
      afiseazaPopupPremium('Eroare salvare concediu', 'error');
      return;
    }

    salvatSiInapoi();
    return;
  }

  if (!selectedDate) {
    afiseazaPopupPremium('Selectează ziua', 'error');
    return;
  }

  if (!selectedStart || !selectedEnd) {
    afiseazaPopupPremium('Selectează intervalul', 'error');
    return;
  }

  const oraStartSalvare = selectedType === 'zi' ? '08:00' : selectedStart;
  const oraFinalSalvare = selectedType === 'zi' ? '22:00' : selectedEnd;

  const { data: blocariExistente, error: errorVerificareBlocari } = await supabaseClient
    .from('indisponibilitati')
    .select('*')
    .eq('activa', true)
    .lte('data_start', selectedDate)
    .gte('data_final', selectedDate);

  if (errorVerificareBlocari) {
    console.log('EROARE VERIFICARE BLOCARI:', errorVerificareBlocari);
    afiseazaPopupPremium('Eroare verificare blocări', 'error');
    return;
  }

  const existaBlocareSuprapusa = (blocariExistente || []).some(function(b) {
    const bStart = ((b.ora_start || '08:00').slice(0,5));
    const bFinal = ((b.ora_final || '22:00').slice(0,5));

    if (b.tip === 'zi' || b.tip === 'concediu') return true;
    if (selectedType === 'zi') return true;

    return oraStartSalvare < bFinal && oraFinalSalvare > bStart;
  });

  if (existaBlocareSuprapusa) {
    afiseazaPopupPremium('Această zi sau acest interval este deja blocat', 'error');
    return;
  }

  const { data: programariExistente, error: errorVerificareProgramari } = await supabaseClient
    .from('programari')
    .select('*')
    .eq('data', selectedDate);

  if (errorVerificareProgramari) {
    console.log('EROARE VERIFICARE PROGRAMARI:', errorVerificareProgramari);
    afiseazaPopupPremium('Eroare verificare programări', 'error');
    return;
  }

  const existaProgramareSuprapusa = (programariExistente || []).some(function(p) {
    if (p.status === 'stearsa') return false;

    const pStart = ((p.ora_start || '').slice(0,5));
    const pFinal = ((p.ora_final || '').slice(0,5));

    if (!pStart || !pFinal) return false;

    return oraStartSalvare < pFinal && oraFinalSalvare > pStart;
  });

  if (existaProgramareSuprapusa) {
    afiseazaPopupPremium('Există deja programare în această zi sau în acest interval', 'error');
    return;
  }

  const { error } = await supabaseClient
    .from('indisponibilitati')
    .insert([{
      tip: selectedType === 'zi' ? 'zi' : 'interval',
      data_start: selectedDate,
      data_final: selectedDate,
      ora_start: oraStartSalvare,
      ora_final: oraFinalSalvare,
      mesaj: mesaj,
      activa: true,
      tip_special: agendaContext ? 'personal' : null
    }]);

  if (error) {
    console.log('EROARE SUPABASE:', error);
    afiseazaPopupPremium('Eroare salvare', 'error');
    return;
  }

  salvatSiInapoi();
}

function updateConcediuDates() {
  concediuStart = document.getElementById('concediuStart').value;
  concediuEnd = document.getElementById('concediuEnd').value;
  updateSummary();
}



/* PRECOMPLETARE DIN AGENDA PERSONALĂ */
function preiaContextAgenda() {
  try {

    const params = new URLSearchParams(window.location.search);

    const data = params.get('data');
    const oraStart = params.get('ora_start');
    const titlu = params.get('titlu');

    if (!data) return;

    agendaContext = {
      data: data,
      ora_start: oraStart || '',
      titlu: titlu || ''
    };

    selectedDate = data;

    document.querySelectorAll('.day-btn').forEach(function(btn) {
      btn.classList.remove('active');

      if (btn.dataset.date === selectedDate) {
        btn.classList.add('active');
      }
    });

    if (oraStart) {
      selectedStart = String(oraStart).slice(0,5);

      const [h] = selectedStart.split(':');
      const oraFinala = String(Number(h) + 1).padStart(2, '0') + ':00';

      selectedEnd = oraFinala;

      document.querySelectorAll('.time-btn').forEach(function(btn) {
        const t = btn.dataset.time;

        if (t >= selectedStart && t <= selectedEnd) {
          btn.classList.add('active');
        }
      });
    }

    updateSummary();

  } catch(e) {
    console.log('EROARE CONTEXT AGENDA:', e);
  }
}

window.addEventListener('load', function() {

  buildDays();
  buildTimes();
  preiaContextAgenda();

  document.getElementById('btnInterval').addEventListener('click', function() {
    setActiveType('interval');
  });

  document.getElementById('btnZi').addEventListener('click', function() {
    setActiveType('zi');
  });

  document.getElementById('btnConcediu').addEventListener('click', function() {
    setActiveType('concediu');
  });

  document.getElementById('concediuStart').addEventListener('change', updateConcediuDates);
  document.getElementById('concediuEnd').addEventListener('change', updateConcediuDates);

  setActiveType('interval');
});
</script>
</head>

<body>

<div class="page">

<div class="header">
  <div class="back-btn" onclick="window.location.href='index_premium.html'">←</div>
  <div class="title">Indisponibilități</div>
</div>

<div class="type-row">
  <div id="btnInterval" class="type-btn">Interval</div>
  <div id="btnZi" class="type-btn">Zi întreagă</div>
  <div id="btnConcediu" class="type-btn">Concediu</div>
</div>

<div id="intervalArea">
