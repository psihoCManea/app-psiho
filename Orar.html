<!DOCTYPE html>
<html lang="ro">
<head>
  <!-- BLOC 1 - SETĂRI PAGINĂ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Orar</title>

  <!-- BLOC 2 - STIL GENERAL -->
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    /* BLOC 3 - PAGINA */
    .page {
      min-height: 100vh;
      padding: 10px 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* BLOC 4 - HEADER */
    .header {
      position: relative;
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .home-btn {
      position: absolute;
      left: 0;
      top: 0;
      height: 27px;
      padding: 0 7px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .title {
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
      color: #f2c94c;
      text-align: center;
    }

    .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      text-align: center;
      margin-top: -6px;
    }

    /* BLOC 5 - TABEL ORAR */
    .orar-wrapper {
      width: 100%;
      overflow-x: auto;
      overflow-y: visible;
      border: 1px solid #f2c94c;
      border-radius: 14px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 10px 24px rgba(0,0,0,0.42);
    }

    .orar-grid {
      display: grid;
      grid-template-columns: 74px repeat(7, 76px);
      min-width: 606px;
    }

    /* BLOC 5A - BUTOANE LUNI */
    .month-buttons {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: -2px;
      margin-bottom: 2px;
    }

    .month-btn {
      min-width: 92px;
      height: 30px;
      padding: 0 12px;
      border-radius: 14px;
      border: 1px solid rgba(242,201,76,0.85);
      background: rgba(0,0,0,0.45);
      color: #f2c94c;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .month-btn.active {
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
    }

    .cell {
      min-height: 46px;
      padding: 4px 3px;
      border-right: 1px solid rgba(242,201,76,0.35);
      border-bottom: 1px solid rgba(242,201,76,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 10px;
      font-weight: 900;
      color: #111;
      line-height: 1.12;
      white-space: normal;
      word-break: break-word;
    }

    .hour-cell {
      position: sticky;
      left: 0;
      z-index: 3;
      background: linear-gradient(145deg, #7ec8ff, #2f7fd1);
      color: #111;
      font-size: 9.5px;
      font-weight: 900;
    }

    .head-cell {
      position: sticky;
      border-bottom: 2px solid black;
      top: 0;
      z-index: 2;
      min-height: 34px;
      background: linear-gradient(145deg, #7ec8ff, #2f7fd1);
      color: #111;
      font-size: 10px;
      font-weight: 900;
      flex-direction: column;
      gap: 2px;
    }

    .head-cell.hour-cell {
      z-index: 4;
    }

    .head-cell.weekend-head {
      background: #000000;
      color: #f2c94c;
      border-bottom: 2px solid #f2c94c;
    }

    .head-cell.weekend-head .day-name,
    .head-cell.weekend-head .day-date {
      color: #f2c94c;
    }

    .day-name {
      font-size: 12.1px;
      font-weight: 900;
      line-height: 1;
    }

    .day-date {
      font-size: 9.9px;
      font-weight: 900;
      line-height: 1;
    }

    .free {
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
    }

    .busy {
      background: rgba(0, 0, 0, 0.5);
      color: #f2c94c;
    }

    .busy-past {
      background: rgba(128, 128, 128, 0.65);
      color: #f2c94c;
    }

    .closed-slot {
      background: linear-gradient(145deg, #5a1233, #250616);
      color: #ffd6e7;
      border-color: rgba(255, 112, 178, 0.85);
      cursor: pointer;
    }

    /* BLOC PERSONAL - AGENDA PERSONALĂ ÎN ORAR */
    .busy-personal {
      background: rgba(255, 0, 0, 0.50);
      color: #ffffff;
    }

    /* BLOC 5B - TEXT CLIENT ÎN ORAR */
    .slot-text {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      width: 100%;
      max-height: 28px;
      font-size: 10px;
      line-height: 1.15;
      font-weight: 900;
    }

    .legend {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      font-size: 11px;
      font-weight: 900;
      color: #fff;
      margin-top: 1px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-box {
      width: 13px;
      height: 13px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.35);
    }

    .legend-box.free-box {
      background: #D5F0C0;
    }

    .legend-box.busy-box {
      background: #FF6B6B;
    }
  
    /* SEPARATOR COLOANA 1 */
    .col-sep {
      box-shadow: inset -2px 0 0 #000 !important;
      z-index: 5;
    }

    /* BLOC DESKTOP - SIMULARE TELEFON IDENTIC PG2 */
    @media (min-width: 701px) {

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
        background: #000000;
      }

      .page {
        position: relative;
        width: 430px;
        max-width: 430px;
        height: 920px;
        min-height: 920px;
        max-height: 920px;
        margin: 0 auto;
        border-radius: 48px;
        padding: 74px 16px 18px;
        background:
          linear-gradient(180deg, rgba(18,18,18,0.98) 0%, rgba(7,7,7,0.98) 100%);
        border: 3px solid rgba(242,201,76,0.92);
        box-shadow:
          0 0 0 3px rgba(255,255,255,0.05),
          0 0 0 12px #000000,
          0 0 35px rgba(242,201,76,0.30),
          0 45px 90px rgba(0,0,0,0.85);
        overflow: hidden;
        transform-origin: center center;
        transform: scale(min(calc((100vw - 80px) / 430), calc((100vh - 80px) / 920)));
        gap: 8px;
      }

      .page::before {
        content: "";
        position: absolute;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        width: 170px;
        height: 35px;
        background: #000000;
        border-radius: 28px;
        z-index: 5;
      }

      .page::after {
        content: "";
        position: absolute;
        top: 36px;
        left: 50%;
        transform: translateX(-50%);
        width: 58px;
        height: 7px;
        background: #222222;
        border-radius: 20px;
        z-index: 6;
      }

      .header {
        min-height: 30px;
      }

      .home-btn {
        height: 27px;
        border-radius: 12px;
        font-size: 11px;
      }

      .title {
        font-size: 22px !important;
      }

      .subtitle {
        font-size: 11px;
      }

      .orar-wrapper {
        flex: 1;
        overflow: auto;
      }
    }

    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.78);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 20px;
    }

    .popup-overlay.show {
      display: flex;
    }

    .popup-box {
      width: 100%;
      max-width: 330px;
      border-radius: 20px;
      border: 2px solid #f2c94c;
      background: linear-gradient(180deg, #121212 0%, #050505 100%);
      box-shadow: 0 0 35px rgba(242,201,76,0.25);
      padding: 22px 18px;
      text-align: center;
    }

    .popup-title {
      color: #f2c94c;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .popup-text {
      color: #ffffff;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 18px;
    }

    .popup-actions {
      display: flex;
      gap: 10px;
    }

    .popup-btn {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    .popup-btn.confirm {
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
    }

    .popup-btn.cancel {
      background: linear-gradient(145deg, #1a1a1a, #070707);
      color: #f2c94c;
      border: 1px solid #f2c94c;
    }

  </style>

  <!-- BLOC SUPABASE - CONECTARE BAZĂ DE DATE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = window.supabase.createClient(

</head>

<body>
  <!-- BLOC HTML 1 - PAGINA ORAR -->
  <div class="page">

    <!-- BLOC HTML 2 - HEADER -->
    <div class="header">
      <button class="home-btn" onclick="goHome()">⌂ HOME</button>
      <div class="title">Orar</div>
    </div>

    <div class="subtitle">Alege luna și trage tabelul dreapta - stânga</div>

    <!-- BLOC HTML 2A - SELECTARE LUNĂ DIN CELE 60 ZILE -->
    <div id="monthButtons" class="month-buttons"></div>

    <!-- BLOC HTML 3 - TABEL -->
    <div class="orar-wrapper">
      <div id="orarGrid" class="orar-grid"></div>
    </div>

    <div class="popup-overlay" id="deblocarePopup">
      <div class="popup-box">
        <div class="popup-title">Slot închis</div>
        <div class="popup-text">Vrei să deblochezi acest interval?</div>
        <div class="popup-actions">
          <button class="popup-btn confirm" onclick="confirmaDeblocare()">Confirm</button>
          <button class="popup-btn cancel" onclick="renuntaDeblocare()">Renunț</button>
        </div>
      </div>
    </div>

  </div>

  <script>
    /* BLOC 6 - SETĂRI ORAR */
    const ORA_START = 8;
    const ORA_FINAL = 22;
    const DURATA_SLOT = 60;
    const NUMAR_ZILE_AFISATE = 90;

    let lunaSelectataOffset = 0;
    let setariOrar = {
      sambata_deschis: true,
      duminica_deschis: false,
      ora_start: '08:00',
      ora_final: '22:00'
    };
    let deblocariOrar = [];
    let slotPentruDeblocare = null;

    const ZILE_SCURT = ['Du', 'Lu', 'Ma', 'Mi', 'Jo', 'Vi', 'Sa'];
    const LUNI = ['ian', 'feb', 'mar', 'apr', 'mai', 'iun', 'iul', 'aug', 'sep', 'oct', 'nov', 'dec'];
    const LUNI_BUTOANE = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie', 'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];

    /* BLOC 7 - HOME */
    function goHome() {
      window.location.href = 'index_premium.html';
    }

    /* BLOC 8 - DATA ZILELOR */
    function getDateIso(offset) {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return new Date(d.getFullYear(), d.getMonth(), d.getDate()).toLocaleDateString('en-CA');
    }

    function getToateZilele60() {
      const zile = [];

      for (let i = 0; i < NUMAR_ZILE_AFISATE; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);
        const dataCurenta = new Date(d.getFullYear(), d.getMonth(), d.getDate());

        zile.push({
          dataIso: dataCurenta.toLocaleDateString('en-CA'),
          ziScurt: ZILE_SCURT[dataCurenta.getDay()],
          dataText: dataCurenta.getDate() + ' ' + LUNI[dataCurenta.getMonth()],
          lunaCheie: dataCurenta.getFullYear() + '-' + dataCurenta.getMonth(),
          lunaIndex: dataCurenta.getMonth()
        });
      }

      return zile;
    }

    function getLuniDisponibile() {
      const toateZilele = getToateZilele60();
      const luni = [];

      toateZilele.forEach(function(zi) {
        const exista = luni.some(function(luna) {
          return luna.cheie === zi.lunaCheie;
        });

        if (!exista) {
          luni.push({
            cheie: zi.lunaCheie,
            nume: LUNI_BUTOANE[zi.lunaIndex]
          });
        }
      });

      return luni;
    }

    function getDays() {
      const toateZilele = getToateZilele60();
      const luni = getLuniDisponibile();

      if (!luni[lunaSelectataOffset]) {
        lunaSelectataOffset = 0;
      }

      const lunaAleasa = luni[lunaSelectataOffset];

      return toateZilele.filter(function(zi) {
        return zi.lunaCheie === lunaAleasa.cheie;
      });
    }

    function seteazaButoaneLuni() {
      const container = document.getElementById('monthButtons');
      if (!container) return;

      const luni = getLuniDisponibile();
      let html = '';

      luni.forEach(function(luna, index) {
        const clasa = index === lunaSelectataOffset ? 'month-btn active' : 'month-btn';
        html += '<button class="' + clasa + '" onclick="schimbaLuna(' + index + ')">' + luna.nume + '</button>';
      });

      container.innerHTML = html;
    }

    function schimbaLuna(index) {
      lunaSelectataOffset = index;
      renderOrar();
    }

    /* BLOC 9 - INTERVALE ORARE */
    function pad(num) {
      return String(num).padStart(2, '0');
    }

    function minuteToText(totalMinute) {
      const h = Math.floor(totalMinute / 60);
      const m = totalMinute % 60;
      return pad(h) + ':' + pad(m);
    }

    function getSlots() {
      const slots = [];
      const start = ORA_START * 60;
      const end = ORA_FINAL * 60;

      for (let t = start; t < end; t += DURATA_SLOT) {
        slots.push({
          startMinute: t,
          endMinute: t + DURATA_SLOT,
          text: minuteToText(t) + '-' + minuteToText(t + DURATA_SLOT)
        });
      }

      return slots;
    }

    async function incarcaSetariOrar() {
      const { data, error } = await supabaseClient
        .from('setari_orar')
        .select('*')
        .eq('id', 1)
        .single();

      if (!error && data) {
        setariOrar = {
          sambata_deschis: data.sambata_deschis === true,
          duminica_deschis: data.duminica_deschis === true,
          ora_start: data.ora_start || '08:00',
          ora_final: data.ora_final || '22:00'
        };
      }
    }

    async function incarcaDeblocariOrar() {
      const { data, error } = await supabaseClient
        .from('deblocari_orar')
        .select('data, ora_start, ora_final, activa')
        .eq('activa', true);

      if (!error) {
        deblocariOrar = data || [];
      } else {
        deblocariOrar = [];
      }
    }

    function esteDeblocatManual(dataIso, slot) {
      return deblocariOrar.some(function(d) {
        if (!d || d.activa !== true) return false;
        if (String(d.data) !== String(dataIso)) return false;

        const start = String(d.ora_start || '').slice(0,5);
        const final = String(d.ora_final || '').slice(0,5);

        return start === minuteToText(slot.startMinute) && final === minuteToText(slot.endMinute);
      });
    }

    function esteSlotInchisDinSetari(zi, slot) {
      if (!zi || !zi.dataIso) return false;

      const dataObj = new Date(zi.dataIso + 'T00:00:00');
      const ziSaptamana = dataObj.getDay();

      if (ziSaptamana === 6 && setariOrar.sambata_deschis !== true) return true;
      if (ziSaptamana === 0 && setariOrar.duminica_deschis !== true) return true;

      const startProgram = timeToMinutes(setariOrar.ora_start || '08:00');
      const finalProgram = timeToMinutes(setariOrar.ora_final || '22:00');

      return slot.startMinute < startProgram || slot.endMinute > finalProgram;
    }

    function cereDeblocareSlot(dataIso, oraStart, oraFinal) {
      slotPentruDeblocare = {
        dataIso: dataIso,
        oraStart: oraStart,
        oraFinal: oraFinal
      };

      const popup = document.getElementById('deblocarePopup');
      if (popup) popup.classList.add('show');
    }

    function renuntaDeblocare() {
      slotPentruDeblocare = null;

      const popup = document.getElementById('deblocarePopup');
      if (popup) popup.classList.remove('show');
    }

    async function confirmaDeblocare() {
      if (!slotPentruDeblocare) return;

      const slot = slotPentruDeblocare;
      renuntaDeblocare();

      window.location.href =
        'Programare_noua_premium_pg3.html?' +
        new URLSearchParams({
          data: slot.dataIso,
          ora: slot.oraStart
        }).toString();
    }

    /* BLOC 10 - CITIRE PROGRAMĂRI ȘI INDISPONIBILITĂȚI DIN SUPABASE */
    async function getProgramari() {
      try {
        let rezultat = [];

        const { data, error } = await supabaseClient
          .from('programari')
          .select('*')
          .neq('status', 'stearsa');

        if (error) {
          console.log('EROARE SUPABASE ORAR:', error);
        } else {
          rezultat = rezultat.concat((data || []).map(function(p) {
            return {
              zi: {
                dataIso: p.data
              },
              interval: p.ora_start + '-' + p.ora_final,
              oraStart: p.ora_start,
              text: p.nume_client || 'Ocupat'
            };
          }));
        }

        const { data: indisponibilitati, error: errorIndisponibilitati } = await supabaseClient
          .from('indisponibilitati')
          .select('tip, data_start, data_final, ora_start, ora_final, mesaj, activa, tip_special')
          .eq('activa', true);

        if (errorIndisponibilitati) {
          console.log('EROARE SUPABASE INDISPONIBILITATI ORAR:', errorIndisponibilitati);
        } else {
          (indisponibilitati || []).forEach(function(blocare) {
            if (!blocare || !blocare.data_start || !blocare.data_final) return;

            if (blocare.tip === 'interval') {
              rezultat.push({
                zi: {
                  dataIso: blocare.data_start
                },
                interval: blocare.ora_start + '-' + blocare.ora_final,
                text: blocare.tip_special === 'personal' ? 'Personal' : (blocare.mesaj || 'Închis'),
                tipSpecial: blocare.tip_special || ''
              });
            }

            if (blocare.tip === 'zi') {
              rezultat.push({
                zi: {
                  dataIso: blocare.data_start
                },
                interval: '08:00-22:00',
                text: blocare.tip_special === 'personal' ? 'Personal' : (blocare.mesaj || 'Închis'),
                tipSpecial: blocare.tip_special || ''
              });
            }

            if (blocare.tip === 'concediu') {
              const start = new Date(blocare.data_start);
              const final = new Date(blocare.data_final);

              for (let d = new Date(start); d <= final; d.setDate(d.getDate() + 1)) {
                const iso = new Date(d.getFullYear(), d.getMonth(), d.getDate()).toLocaleDateString('en-CA');

                rezultat.push({
                  zi: {
                    dataIso: iso
                  },
                  interval: '08:00-22:00',
                  text: blocare.mesaj || 'Concediu'
                });
              }
            }
          });
        }

        return rezultat;
      } catch(e) {
        console.log('EROARE SUPABASE ORAR:', e);
        return [];
      }
    }

    function timeToMinutes(t) {
      if (!t || t.indexOf(':') === -1) return 0;
      const parti = t.split(':');
      return Number(parti[0]) * 60 + Number(parti[1]);
    }

    function intervalToMinutes(interval) {
      if (!interval || interval.indexOf('-') === -1) return null;

      const parti = interval.split('-');
      const start = parti[0].trim().split(':');
      const end = parti[1].trim().split(':');

      if (start.length < 2 || end.length < 2) return null;

      return {
        startMinute: Number(start[0]) * 60 + Number(start[1]),
        endMinute: Number(end[0]) * 60 + Number(end[1])
      };
    }

    /* BLOC 11 - VERIFICARE OCUPAT / LIBER */
    function getBlocarePentruSlot(dataIso, slot, programari) {
      return programari.find(function(p) {
        if (!p || !p.zi || !p.zi.dataIso || !p.interval) return false;
        if (p.zi.dataIso !== dataIso) return false;

        const interval = intervalToMinutes(p.interval);
        if (!interval) return false;

        return slot.startMinute < interval.endMinute && slot.endMinute > interval.startMinute;
      });
    }

    function esteProgramareInceputa(dataIso, blocare) {
      if (!blocare || !blocare.oraStart) return false;

      const acum = new Date();
      const aziIso = new Date(acum.getFullYear(), acum.getMonth(), acum.getDate()).toLocaleDateString('en-CA');

      if (dataIso !== aziIso) return false;

      const partiOra = blocare.oraStart.split(':');
      if (partiOra.length < 2) return false;

      const dataInceput = new Date(dataIso);
      dataInceput.setHours(Number(partiOra[0]), Number(partiOra[1]), 0, 0);

      return acum > dataInceput;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    /* BLOC 11A - DESCHIDE PROGRAMARE DIN CELULĂ LIBERĂ */
    function deschideProgramareDinOrar(dataIso, oraStart) {
      const params = new URLSearchParams({
        data: dataIso,
        ora: oraStart
      });

      window.location.href =
        'Programare_noua_premium_pg3.html?' + params.toString();
    }

    /* BLOC 12 - AFIȘARE TABEL */
    async function renderOrar() {
      const grid = document.getElementById('orarGrid');
      const zile = getDays();
      const slots = getSlots();
      await incarcaSetariOrar();
      await incarcaDeblocariOrar();

      const programari = await getProgramari();

      seteazaButoaneLuni();
      grid.style.gridTemplateColumns = '74px repeat(' + zile.length + ', 76px)';
      grid.style.minWidth = (74 + (zile.length * 76)) + 'px';

      let html = '';

      html += '<div class="cell head-cell hour-cell col-sep">Ora</div>';

      zile.forEach(function(zi) {
        const esteWeekend = zi.ziScurt === 'Sa' || zi.ziScurt === 'Du';
        const clasaWeekend = esteWeekend ? ' weekend-head' : '';

        html += `
          <div class="cell head-cell${clasaWeekend}">
            <div class="day-name">${zi.ziScurt}</div>
            <div class="day-date">${zi.dataText}</div>
          </div>
        `;
      });

      slots.forEach(function(slot) {
        html += `<div class="cell hour-cell col-sep">${slot.text}</div>`;

        zile.forEach(function(zi) {
          const blocare = getBlocarePentruSlot(zi.dataIso, slot, programari);
          const ocupat = !!blocare;
          const deblocatManual = esteDeblocatManual(zi.dataIso, slot);
          const inchisDinSetari = !ocupat && !deblocatManual && esteSlotInchisDinSetari(zi, slot);
          const programareInceputa = ocupat && esteProgramareInceputa(zi.dataIso, blocare);
          const estePersonal = ocupat && blocare.tipSpecial === 'personal';

          if (ocupat) {
            const clasaCelula = estePersonal ? 'busy-personal' : (programareInceputa ? 'busy-past' : 'busy');
            const textCelula = estePersonal ? 'Personal' : (blocare.text || 'Ocupat');

            html += `<div class="cell ${clasaCelula}"><div class="slot-text">${escapeHtml(textCelula)}</div></div>`;
          } else if (inchisDinSetari) {
            html += `<div class="cell closed-slot" onclick="cereDeblocareSlot('${zi.dataIso}', '${minuteToText(slot.startMinute)}', '${minuteToText(slot.endMinute)}')"><div class="slot-text">Închis</div></div>`;
          } else {
            html += `<div class="cell free" onclick="deschideProgramareDinOrar('${zi.dataIso}', '${minuteToText(slot.startMinute)}')"><div class="slot-text">Liber</div></div>`;
          }
        });
      });

      grid.innerHTML = html;
    }

    renderOrar();
  </script>
</body>
</html>
