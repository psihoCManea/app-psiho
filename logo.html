<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 22px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    .title {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 20px;
      font-size: 50px;
      color: white;
      font-weight: normal;
    }

    .nav-back {
      position:absolute;
      left:0;
      top:-10px;
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
    }

    .arrow {
      font-size:90px;
      font-weight:900;
      color:#f2c94c;
    }

    .back-text {
      color:red;
      font-size:35px;
      font-weight:900;
      margin-top:22px;
    }

    .steps {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 30px 0;
    }

    .step {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
      color: #f5d37a;
    }

    .step.active {
      background: #f2c94c;
      color: #000;
    }

    .line {
      width: 45px;
      height: 3px;
      background: #d4af37;
    }

    .info-card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 18px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .info-card.duration-card {
      justify-content: space-between;
    }

    .icon-circle {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffe28a, #d99a35);
      color: #071320;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      font-weight: 900;
    }

    .info-label {
      font-size: 21px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 6px;
      font-weight: 800;
    }

    .info-value {
      font-size: 30px;
      font-weight: 900;
      color: #fff;
      line-height: 1.05;
    }

    .change-btn {
      border: 2px solid #f4c363;
      border-radius: 18px;
      padding: 18px 28px;
      color: #f4c363;
      font-size: 32px;
      font-weight: 900;
      background: rgba(244,195,99,0.08);
      cursor: pointer;
    }

    .section-title {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #f4c363;
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .days-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-card {
      position: relative;
      min-height: 96px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      background: rgba(12, 24, 38, 0.86);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.17);
    }

    .day-card.selected {
      border: 2px solid #f4c363;
    }

    .day-card.selected::after {
      content: "";
      position: absolute;
      bottom: -7px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f4c363;
    }

    .day-name {
      font-size: 24px;
      margin-bottom: 5px;
      font-weight: 900;
    }

    .day-number {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .day-month {
      margin-top: 5px;
      font-size: 24px;
      font-weight: 900;
      color: rgba(255,255,255,0.9);
    }

    .availability-title {
      margin-top: 6px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: #f4c363;
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.28;
    }

    .slots-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      flex: 1;
    }

    .slot {
      height: 80px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(12, 24, 38, 0.76);
      color: rgba(255,255,255,1);
      font-size: 42px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      letter-spacing: -0.5px;
    }

    .slot.occupied {
      color: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.035);
      cursor: not-allowed;
    }

    .slot.selected-range {
      border: 4px solid #ff2020;
      color: rgba(255,255,255,1);
      background: #1fae4b;
      color: #fff;
      border: 4px solid #1fae4b;
    }
    .slot.conflict {
      border: 4px solid #ff2020;
      background: #ff2020 !important;
      color: #fff;
    }

    .slot.confirmed {
      color: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.035);
      cursor: not-allowed;
    }

    .message-box {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 20px 18px;
      display: flex;
      align-items: center;
      gap: 13px;
      background: rgba(10, 22, 36, 0.9);
      min-height: 150px;
    }

    .message-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2px solid #f4c363;
      color: #f4c363;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 31px;
      flex-shrink: 0;
      font-weight: 900;
    }

    .message-main {
      font-size: 35px;
      line-height: 1.08;
      color: #fff;
      font-weight: 900;
    }

    .message-red {
      color: #ff4040;
      font-weight: 900;
    }

    .message-green {
      color: #58d45f;
      font-weight: 900;
    }

    .confirm-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 19px 16px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(0,0,0,0.34);
    }

    .confirm-btn.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.25);
    }

    .confirm-icon {
      font-size: 33px;
      color: #000 !important;
    }

    .confirm-title {
      font-size: 23px;
      line-height: 1.05;
    }

    .confirm-sub {
      font-size: 15px;
      font-weight: 600;
      margin-top: 5px;
    }

    .bottom-bar {
      display:flex;
      justify-content:space-between;
      gap:20px;
    }

    .box-btn {
      flex:1;
      height:110px;
      border-radius:24px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:36px;
      font-weight:900;
      color:#111;
      cursor:pointer;
    }

    @media (max-width: 430px) {
      .info-label {
        font-size: 22px;
      }

      .info-value {
        font-size: 30px;
      }

      .icon-circle {
        width: 52px;
        height: 52px;
        font-size: 29px;
      }

      .change-btn {
        font-size: 24px;
        padding: 14px 20px;
      }

      .day-card {
        min-height: 86px;
      }

      .day-name {
        font-size: 18px;
      }

      .day-number {
        font-size: 24px;
      }

      .day-month {
        font-size: 18px;
      }

      .slot {
        height: 86px;
        font-size: 31px;
      }

      .message-main {
        font-size: 25px;
      }

      .message-box {
        min-height: 126px;
      }
    }

    @media (max-width: 390px) {
      .page {
        padding: 18px 12px 14px;
        gap: 10px;
      }

      .title {
        font-size: 25px;
      }

      .slot {
        height: 78px;
        font-size: 28px;
      }

      .message-main {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="header" style="position:relative;">
      <div class="nav-back" onclick="goBack()">
        <div class="arrow">«</div>
        <div class="back-text">BACK</div>
      </div>
      <div class="title">Programare nouă</div>
      <div class="subtitle">Alege ziua și ora</div>
    </div>

    <div class="steps">
      <div class="step">1</div>
      <div class="line"></div>
      <div class="step">2</div>
      <div class="line"></div>
      <div class="step active">3</div>
      <div class="line"></div>
      <div class="step">4</div>
    </div>

    <div class="info-card">
      <div class="icon-circle">👤</div>
      <div>
        <div class="info-label">Client selectat</div>
        <div class="info-value" id="clientName">Alexandru Popescu</div>
      </div>
    </div>

    <div class="info-card duration-card">
      <div style="display:flex; align-items:center; gap:13px;">
        <div class="icon-circle">◷</div>
        <div>
          <div class="info-label">Durată selectată</div>
          <div class="info-value"><span id="durationText">60 minute</span></div>
        </div>
      </div>
      <button class="change-btn" onclick="changeDuration()">Schimbă</button>
    </div>

    <div class="section-title">▣ Zile disponibile</div>

    <div class="days-row" id="daysRow"></div>

    <div class="availability-title">
      <span>◷</span>
      <span id="availabilityTitle">Ore disponibile pentru<br>SÂMBĂTĂ, 18 MAI</span>
    </div>

    <div class="slots-grid" id="slotsGrid"></div>

    <div class="message-box">
      <div class="message-icon" id="messageIcon">i</div>
      <div class="message-main" id="messageText">Alege ora.</div>
    </div>

    <button class="confirm-btn disabled" id="confirmBtn" onclick="confirmAppointment()">
      <div class="confirm-icon">✔</div>
      <div>
        <div class="confirm-title">CONFIRMĂ PROGRAMAREA</div>
      </div>
    </button>

    <div class="bottom-bar">
      <div class="box-btn" onclick="goHome()">⌂ HOME</div>
      <div class="box-btn" onclick="nextStep()">NEXT</div>
    </div>

  </div>

  <script>
    var durataSelectata = Number(localStorage.getItem('programare_durata') || 60);
    var sloturiNecesare = durataSelectata / 30;
    var client = null;
    var ziSelectataIndex = 0;
    var oraSelectataIndex = null;
    var confirmata = false;

    var zile = [];
    var zileNume = ['Du', 'Lu', 'Ma', 'Mi', 'Joi', 'Vi', 'Sa'];
    var zileTitlu = ['DUMINICĂ', 'LUNI', 'MARȚI', 'MIERCURI', 'JOI', 'VINERI', 'SÂMBĂTĂ'];
    var luni = ['Ian', 'Feb', 'Mar', 'Apr', 'Mai', 'Iun', 'Iul', 'Aug', 'Sep', 'Oct', 'Noi', 'Dec'];
    var luniTitlu = ['IANUARIE', 'FEBRUARIE', 'MARTIE', 'APRILIE', 'MAI', 'IUNIE', 'IULIE', 'AUGUST', 'SEPTEMBRIE', 'OCTOMBRIE', 'NOIEMBRIE', 'DECEMBRIE'];

    var sloturi = [
      '08:00', '08:30', '09:00', '09:30',
      '10:00', '10:30', '11:00', '11:30',
      '12:00', '12:30', '13:00', '13:30',
      '14:00', '14:30', '15:00', '15:30',
      '16:00', '16:30', '17:00', '17:30',
      '18:00', '18:30', '19:00', '19:30',
      '20:00', '20:30', '21:00', '21:30'
    ];

    var ocupatePeZile = [
      [0, 1, 8, 9, 16, 17, 20, 21],
      [0, 1, 9, 10, 17, 22, 23],
      [2, 3, 12, 13, 14, 25],
      [5, 6, 7, 18, 19, 24],
      [0, 1, 2, 15, 16, 27],
      [10, 11, 12, 13, 14, 15],
      [0, 1, 2, 3, 4, 5]
    ];

    function init() {
      try { client = JSON.parse(localStorage.getItem('programare_client') || 'null'); } catch(e) {}
      if (!client) {
        location.href = 'Programare_noua_premium_pg1.html';
        return;
      }

      document.getElementById('clientName').textContent = client.nume || '-';
      document.getElementById('durationText').textContent = durataSelectata + ' minute';

      buildDynamicDays();
      renderDays();
      renderSlots();
      updateAvailabilityTitle();
    }

    function buildDynamicDays() {
      zile = [];
      var azi = new Date();

      for (var i = 0; i < 7; i++) {
        var d = new Date(azi);
        d.setDate(azi.getDate() + i);

        var ziIndex = d.getDay();
        var lunaIndex = d.getMonth();
        var nr = String(d.getDate());

        zile.push({
          nume: zileNume[ziIndex],
          nr: nr,
          luna: luni[lunaIndex],
          titlu: zileTitlu[ziIndex] + ', ' + nr + ' ' + luniTitlu[lunaIndex]
        });
      }
    }

    function renderDays() {
      var wrap = document.getElementById('daysRow');
      wrap.innerHTML = '';

      zile.forEach(function(zi, index) {
        var div = document.createElement('div');
        div.className = 'day-card' + (index === ziSelectataIndex ? ' selected' : '');
        div.onclick = function() { selectDay(index); };

        div.innerHTML =
          '<div class="day-name">' + zi.nume + '</div>' +
          '<div class="day-number">' + zi.nr + '</div>' +
          '<div class="day-month">' + zi.luna + '</div>';

        wrap.appendChild(div);
      });
    }

    function renderSlots() {
      var grid = document.getElementById('slotsGrid');
      grid.innerHTML = '';

      var ocupate = ocupatePeZile[ziSelectataIndex];

      sloturi.forEach(function(slot, index) {
        var div = document.createElement('div');
        div.className = 'slot';

        if (ocupate.indexOf(index) !== -1) {
          div.classList.add('occupied');
        }

        if (confirmata && esteInInterval(index)) {
          div.classList.add('confirmed');
        } else if (!confirmata && esteInInterval(index)) {
          if (!intervalEsteLiber()) {
            div.classList.add('conflict');
          } else {
            div.classList.add('selected-range');
          }
        }

        div.textContent = slot;
        div.onclick = function() { selectSlot(index); };

        grid.appendChild(div);
      });
    }

    function selectDay(index) {
      ziSelectataIndex = index;
      oraSelectataIndex = null;
      confirmata = false;

      renderDays();
      updateAvailabilityTitle();
      renderSlots();
      resetMessage();
      setConfirmEnabled(false);
      resetButton();
    }

    function selectSlot(index) {
      if (confirmata) return;

      oraSelectataIndex = index;
      renderSlots();

      if (!intervalEsteLiber()) {
        updateMessageOccupied();
        setConfirmEnabled(false);
        speakText('Interval ocupat');
        return;
      }

      updateMessageFree();
      setConfirmEnabled(true);
    }

    function esteInInterval(index) {
      if (oraSelectataIndex === null) return false;
      return index >= oraSelectataIndex && index < oraSelectataIndex + sloturiNecesare;
    }

    function intervalEsteLiber() {
      if (oraSelectataIndex === null) return false;

      var ocupate = ocupatePeZile[ziSelectataIndex];

      if (oraSelectataIndex + sloturiNecesare > sloturi.length) {
        return false;
      }

      for (var i = 0; i < sloturiNecesare; i++) {
        if (ocupate.indexOf(oraSelectataIndex + i) !== -1) {
          return false;
        }
      }

      return true;
    }

    function getEndTime(startIndex) {
      var totalMinutes = 8 * 60 + (startIndex * 30) + durataSelectata;
      var h = Math.floor(totalMinutes / 60);
      var m = totalMinutes % 60;

      return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    function getIntervalText() {
      if (oraSelectataIndex === null) return '';
      return sloturi[oraSelectataIndex] + ' - ' + getEndTime(oraSelectataIndex);
    }

    function speakText(text) {
      try {
        var msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ro-RO';
        msg.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
      } catch(e) {}
    }

    function updateAvailabilityTitle() {
      document.getElementById('availabilityTitle').innerHTML =
        'Ore disponibile pentru<br>' + zile[ziSelectataIndex].titlu;
    }

    function resetMessage() {
      document.getElementById('messageIcon').textContent = 'i';
      document.getElementById('messageIcon').style.borderColor = '#f4c363';
      document.getElementById('messageIcon').style.color = '#f4c363';
      document.getElementById('messageText').innerHTML = 'Alege ora.';
    }

    function updateMessageFree() {
      document.getElementById('messageIcon').textContent = 'i';
      document.getElementById('messageIcon').style.borderColor = '#f4c363';
      document.getElementById('messageIcon').style.color = '#f4c363';
      document.getElementById('messageText').innerHTML =
        '<span class="message-red">' + getIntervalText() + '</span><br>' +
        '<span class="message-green">Interval liber</span>';
    }

    function updateMessageOccupied() {
      document.getElementById('messageIcon').textContent = '!';
      document.getElementById('messageIcon').style.borderColor = '#ff4040';
      document.getElementById('messageIcon').style.color = '#ff4040';
      document.getElementById('messageText').innerHTML =
        '<span class="message-red">Interval ocupat</span><br>' +
        getIntervalText();
    }

    function updateMessageConfirmed() {
      document.getElementById('messageIcon').textContent = '✓';
      document.getElementById('messageIcon').style.borderColor = '#58d45f';
      document.getElementById('messageIcon').style.color = '#58d45f';
      document.getElementById('messageText').innerHTML =
        '<span class="message-green">Confirmat!</span><br>' +
        getIntervalText();
    }

    function setConfirmEnabled(enabled) {
      var btn = document.getElementById('confirmBtn');

      if (enabled) {
        btn.classList.remove('disabled');
      } else {
        btn.classList.add('disabled');
      }
    }

    function confirmAppointment() {
      if (oraSelectataIndex === null) return;

      if (!intervalEsteLiber()) {
        speakText('Interval ocupat');
        return;
      }

      confirmata = true;
      renderSlots();
      updateMessageConfirmed();

      var btn = document.getElementById('confirmBtn');
      btn.classList.add('disabled');
      btn.querySelector('.confirm-title').textContent = 'PROGRAMARE CONFIRMATĂ';

      localStorage.setItem('programare_rezultat', JSON.stringify({
        client: client,
        durata: durataSelectata,
        zi: zile[ziSelectataIndex],
        interval: getIntervalText()
      }));
    }

    function resetButton() {
      var btn = document.getElementById('confirmBtn');
      btn.querySelector('.confirm-title').textContent = 'CONFIRMĂ PROGRAMAREA';
    }

    function changeDuration() {
      window.top.location.href = 'https://script.google.com/macros/s/AKfycby2tjD2CatxPD8xtCS7eQle7_DxRzmvPITcsLwkEHfMvHilSy-jYx9fNPOcc_5D86dXDw/exec?page=Programare_noua_premium_pg2&_nav=1';
    }

    function goBack() {
      window.top.location.href = 'https://script.google.com/macros/s/AKfycby2tjD2CatxPD8xtCS7eQle7_DxRzmvPITcsLwkEHfMvHilSy-jYx9fNPOcc_5D86dXDw/exec?page=Programare_noua_premium_pg2&_nav=1';
    }

    function goHome() {
      window.top.location.href = 'https://script.google.com/macros/s/AKfycby2tjD2CatxPD8xtCS7eQle7_DxRzmvPITcsLwkEHfMvHilSy-jYx9fNPOcc_5D86dXDw/exec?page=index_premium&_nav=1';
    }

    function nextStep() {
      window.top.location.href = 'https://script.google.com/macros/s/AKfycby2tjD2CatxPD8xtCS7eQle7_DxRzmvPITcsLwkEHfMvHilSy-jYx9fNPOcc_5D86dXDw/exec?page=Programare_noua_premium_pg4&_nav=1';
    }

    init();
  </script>
</body>
</html>
