<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta charset="UTF-8">
  <title>Agenda personală</title>

  <style>
    /* ===== BAZĂ PAGINĂ ===== */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
      overflow-x: hidden;
    }

    body { min-height: 100vh; }

    .page {
      min-height: 100vh;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    /* ===== HEADER ===== */
    .header {
      position: relative;
      text-align: center;
      margin-bottom: 2px;
    }

    .nav-back {
      position: absolute;
      left: 0;
      top: -4px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .arrow {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
    }

    .back-text {
      color: #ff0000;
      font-size: 14px;
      font-weight: 900;
      margin-top: 10px;
    }

    .title {
      font-size: 24px;
      font-weight: 900;
      color: #f2c94c;
      line-height: 1.05;
    }

    .subtitle {
      margin-top: 5px;
      font-size: 15px;
      color: #ffffff;
      font-weight: 800;
    }

    /* ===== CARD FORMULAR ===== */
    .agenda-card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 13px;
      padding: 10px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .field-label {
      font-size: 11px;
      color: #f4c363;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .field-input {
      width: 100%;
      height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(244,195,99,0.65);
      background: #080808;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      padding: 0 11px;
      outline: none;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .checkbox-card {
      border: 1px solid rgba(244,195,99,0.65);
      border-radius: 12px;
      background: linear-gradient(145deg, #1a1a1a, #070707);
      padding: 10px;
      display: flex;
      align-items: center;
      gap: 9px;
      color: #fff;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.15;
    }

    .checkbox-card input {
      width: 22px;
      height: 22px;
      accent-color: #f2c94c;
      flex-shrink: 0;
    }

    /* ===== MESAJE ===== */
    .app-message {
      min-height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(244,195,99,0.55);
      background: rgba(10, 22, 36, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      color: #f4c363;
    }

    .app-message.error {
      color: #ff4040;
      border-color: rgba(255,64,64,0.75);
    }

    .app-message.ok {
      color: #58d45f;
      border-color: rgba(88,212,95,0.75);
    }

    /* ===== LISTĂ AGENDA ===== */
    .list-card {
      border: 1px solid rgba(242,201,76,0.65);
      border-radius: 14px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 10px 24px rgba(0,0,0,0.42);
      padding: 10px;
      flex: 1;
      min-height: 220px;
      max-height: 100%;
      overflow-y: auto;
      padding-right: 4px;
      scroll-behavior: smooth;
    }

    .list-title {
      color: #f2c94c;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 9px;
      text-transform: uppercase;
    }

    .agenda-item {
      border: 1px solid rgba(242,201,76,0.45);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      padding: 9px;
      margin-bottom: 8px;
    }

    .agenda-item-title {
      color: #ffffff;
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .agenda-item-date {
      color: #f2c94c;
      font-size: 12px;
      font-weight: 900;
    }

    .agenda-empty {
      color: rgba(255,255,255,0.72);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      padding-top: 35px;
    }

    /* ===== BUTOANE ===== */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 0;
    }

    .box-btn {
      flex: 1;
      height: 46px;
      border-radius: 13px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: #111;
      cursor: pointer;
      border: none;
    }

    .box-btn.secondary {
      background: linear-gradient(145deg, #1a1a1a, #070707);
      color: #f2c94c;
      border: 1px solid #f2c94c;
    }

    /* ===== SIMULARE TELEFON DESKTOP ===== */
    @media (min-width: 701px) {
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
        background: #000000;
      }

      .page {
        position: relative;
        width: 430px;
        max-width: 430px;
        height: 920px;
        min-height: 920px;
        max-height: 920px;
        margin: 0 auto;
        border-radius: 48px;
        padding: 74px 16px 18px;
        background:
          linear-gradient(180deg, rgba(18,18,18,0.98) 0%, rgba(7,7,7,0.98) 100%);
        border: 3px solid rgba(242,201,76,0.92);
        box-shadow:
          0 0 0 3px rgba(255,255,255,0.05),
          0 0 0 12px #000000,
          0 0 35px rgba(242,201,76,0.30),
          0 45px 90px rgba(0,0,0,0.85);
        overflow: hidden;
        transform-origin: center center;
        transform: scale(min(calc((100vw - 80px) / 430), calc((100vh - 80px) / 920)));
        gap: 9px;
      }

      .page::before {
        content: "";
        position: absolute;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        width: 170px;
        height: 35px;
        background: #000000;
        border-radius: 28px;
        z-index: 5;
      }

      .page::after {
        content: "";
        position: absolute;
        top: 36px;
        left: 50%;
        transform: translateX(-50%);
        width: 58px;
        height: 7px;
        background: #222222;
        border-radius: 20px;
        z-index: 6;
      }
    }
  </style>

  <!-- ===== SUPABASE ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://ksdcstrnsnqvqyyitcol.supabase.co',
      'sb_publishable_TDzH5gP2zi9jwmUVLlWrQA_p4TiPTZ_'
    );
  </script>
</head>

<body>
  <div class="page">

    <!-- ===== HEADER ===== -->
    <div class="header">
      <div class="nav-back" onclick="goHome()">
        <div class="arrow">«</div>
        <div class="back-text">BACK</div>
      </div>
      <div class="title">Agenda personală</div>
      <div class="subtitle">Taskuri și programări personale</div>
    </div>

    <!-- ===== FORMULAR AGENDA ===== -->
    <div class="agenda-card">
      <div>
        <div class="field-label">Denumire</div>
        <input id="titluAgenda" class="field-input" placeholder="Ex: Programare dentist">
      </div>

      <div class="field-row">
        <div>
          <div class="field-label">Ziua</div>
          <input id="dataAgenda" class="field-input" type="date">
        </div>

        <div>
          <div class="field-label">Ora</div>

          <div style="display:flex; align-items:center; gap:6px;">
            <input id="oraAgendaOra" class="field-input" type="text" maxlength="2" placeholder="09" style="text-align:center;" oninput="sariLaMinute()">
            <div style="font-size:22px; font-weight:900; color:#f2c94c;">:</div>
            <input id="oraAgendaMinute" class="field-input" type="text" maxlength="2" placeholder="00" style="text-align:center;">
          </div>
        </div>
      </div>

      <label class="checkbox-card">
        <input id="blocheazaOrar" type="checkbox">
        <span>Blochează și în Orarul profesional</span>
      </label>
    </div>

    <!-- ===== MESAJ ===== -->
    <div id="appMessage" class="app-message">Completează taskul personal.</div>

    <!-- ===== LISTĂ TASKURI ===== -->
    <div class="list-card">
      <div class="list-title">Agenda viitoare</div>
      <div id="agendaList"></div>
    </div>

    <!-- ===== BUTOANE ===== -->
    <div class="bottom-bar">
      <button class="box-btn secondary" onclick="goHome()">HOME</button>
      <button class="box-btn" onclick="salveazaAgenda()">SALVEAZĂ</button>
    </div>

  </div>

  <script>
    /* ===== SETĂRI TEXT DATĂ ===== */
    const ZILE_TEXT = ['Duminică', 'Luni', 'Marți', 'Miercuri', 'Joi', 'Vineri', 'Sâmbătă'];
    const LUNI_TEXT = ['ian', 'feb', 'mar', 'apr', 'mai', 'iun', 'iul', 'aug', 'sep', 'oct', 'nov', 'dec'];

    /* ===== MESAJE PREMIUM ===== */
    function afiseazaMesaj(text, tip) {
      const box = document.getElementById('appMessage');
      if (!box) return;

      box.className = 'app-message';

      if (tip === 'error') box.classList.add('error');
      if (tip === 'ok') box.classList.add('ok');

      box.innerText = text;
    }

    /* ===== FORMATARE DATĂ ===== */
    function formatDateForDisplay(dataIso, oraStart) {
      const parti = String(dataIso || '').split('-');
      if (parti.length !== 3) return dataIso + ' ' + oraStart;

      const d = new Date(Number(parti[0]), Number(parti[1]) - 1, Number(parti[2]));
      return ZILE_TEXT[d.getDay()] + ' ' + Number(parti[2]) + ' ' + LUNI_TEXT[d.getMonth()] + ' ' + (oraStart || '');
    }

    /* ===== ORĂ - SARE AUTOMAT LA MINUTE ===== */
    function sariLaMinute() {
      const oraInput = document.getElementById('oraAgendaOra');
      const minuteInput = document.getElementById('oraAgendaMinute');

      if (!oraInput || !minuteInput) return;

      oraInput.value = oraInput.value.replace(/\D/g, '').slice(0, 2);

      if (oraInput.value.length === 2) {
        minuteInput.focus();
      }
    }

    /* ===== SALVARE AGENDA ===== */
    async function salveazaAgenda() {
      const titlu = document.getElementById('titluAgenda').value.trim();
      const data = document.getElementById('dataAgenda').value;
      const oraVal = document.getElementById('oraAgendaOra').value.trim();
      const minutVal = document.getElementById('oraAgendaMinute').value.trim();

      const ora = oraVal + ':' + minutVal;
      const blocheaza = document.getElementById('blocheazaOrar').checked;

      if (!titlu) {
        afiseazaMesaj('Completează denumirea.', 'error');
        return;
      }

      if (!data) {
        afiseazaMesaj('Alege ziua.', 'error');
        return;
      }

      if (!ora) {
        afiseazaMesaj('Completează ora.', 'error');
        return;
      }

      const regexOra = /^([0-1][0-9]|2[0-3]):([0-5][0-9])$/;

      if (!regexOra.test(ora)) {
        afiseazaMesaj('Ora trebuie în format HH:MM', 'error');
        return;
      }

      try {
        const { error } = await supabaseClient
          .from('agenda_personala')
          .insert([
            {
              titlu: titlu,
              data: data,
              ora_start: ora,
              blocheaza_orar: blocheaza
            }
          ]);

        if (error) {
          console.log('EROARE SALVARE AGENDA:', error);
          afiseazaMesaj('Eroare la salvarea taskului.', 'error');
          return;
        }

        if (blocheaza) {

          afiseazaMesaj('Task salvat. Se deschide Indisponibilități.', 'ok');

          setTimeout(function() {
            const params = new URLSearchParams({
              titlu: titlu,
              data: data,
              ora_start: ora
            });

            window.location.href =
              'Indisponibilitati_premium.html?' + params.toString();
          }, 600);

          return;
        } else {
          afiseazaMesaj('Task personal salvat.', 'ok');
        }

        document.getElementById('titluAgenda').value = '';
        document.getElementById('dataAgenda').value = '';
        document.getElementById('oraAgendaOra').value = '';
        document.getElementById('oraAgendaMinute').value = '';
        document.getElementById('blocheazaOrar').checked = false;

        await incarcaAgenda();

      } catch(e) {
        console.log('EROARE SALVARE AGENDA:', e);
        afiseazaMesaj('Eroare la salvarea taskului.', 'error');
      }
    }

    /* ===== DATĂ AZI FORMAT SIGUR YYYY-MM-DD ===== */
    function getAziIsoAgenda() {
      const d = new Date();
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return yyyy + '-' + mm + '-' + dd;
    }

    /* ===== ÎNCĂRCARE LISTĂ AGENDA ===== */
    async function incarcaAgenda() {
      const list = document.getElementById('agendaList');
      if (!list) return;

      const acum = new Date();

      try {
        const { data, error } = await supabaseClient
          .from('agenda_personala')
          .select('*')
          .order('data', { ascending: true })
          .order('ora_start', { ascending: true });

        if (error) {
          console.log('EROARE CITIRE AGENDA:', error);
          list.innerHTML = '<div class="agenda-empty">Eroare la citirea agendei.</div>';
          return;
        }

        const listaFiltrata = (data || []).filter(function(item) {

          if (!item.data || !item.ora_start) return false;

          const oraCurata = String(item.ora_start || '').slice(0, 5);

          const dataOraTask = new Date(item.data + 'T' + oraCurata + ':00');

          const limitaStergere = new Date(dataOraTask.getTime() + (30 * 60 * 1000));

          return acum < limitaStergere;
        });

        if (!listaFiltrata.length) {
          list.innerHTML = '<div class="agenda-empty">Nu există taskuri viitoare.</div>';
          return;
        }

        let html = '';

        listaFiltrata.forEach(function(item) {

          const dataFormatata = formatDateForDisplay(item.data, String(item.ora_start || '').slice(0, 5));

          html +=
            '<div class="agenda-item">' +
              '<div class="agenda-item-title">' + escapeHtml(item.titlu || '') + '</div>' +
              '<div class="agenda-item-date">' + escapeHtml(dataFormatata) + '</div>' +
            '</div>';
        });

        list.innerHTML = html;

      } catch(e) {
        console.log('EROARE CITIRE AGENDA:', e);
        list.innerHTML = '<div class="agenda-empty">Eroare la citirea agendei.</div>';
      }
    }

    /* ===== NAVIGARE ===== */
    function goHome() {
      window.location.href = 'index_premium.html';
    }

    /* ===== PROTECȚIE TEXT ===== */
    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    incarcaAgenda();

    setInterval(function() {
      incarcaAgenda();
    }, 60000);
  </script>
</body>
</html>
