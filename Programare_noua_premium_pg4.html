<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 22px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    .title {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 20px;
      font-size: 50px;
      color: white;
      font-weight: normal;
    }

    .nav-back {
      position:absolute;
      left:0;
      top:-10px;
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
    }

    .arrow {
      font-size:90px;
      font-weight:900;
      color:#f2c94c;
    }

    .back-text {
      color:red;
      font-size:35px;
      font-weight:900;
      margin-top:22px;
    }

    .steps {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 30px 0;
    }

    .step {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
      color: #f5d37a;
    }

    .step.active {
      background: #f2c94c;
      color: #000;
    }

    .line {
      width: 45px;
      height: 3px;
      background: #d4af37;
    }

    .info-card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 18px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .info-card.duration-card {
      justify-content: space-between;
    }

    .icon-circle {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffe28a, #d99a35);
      color: #071320;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      font-weight: 900;
    }

    .info-label {
      font-size: 21px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 6px;
      font-weight: 800;
    }

    .info-value {
      font-size: 30px;
      font-weight: 900;
      color: #fff;
      line-height: 1.05;
    }

    .choice-space {
      height: 34px;
      flex-shrink: 0;
    }

    .message-box {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 20px 18px;
      display: flex;
      align-items: center;
      gap: 13px;
      min-height: 120px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .message-box.green {
      background: #1fae4b;
    }

    .message-box.red {
      background: #ff2020;
    }

    .message-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2px solid #000;
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 31px;
      flex-shrink: 0;
      font-weight: 900;
    }

    .whatsapp-icon {
    width: 34px;
    height: 34px;
    filter: brightness(0);
    }

    .message-main {
      font-size: 25px;
      line-height: 1.08;
      color: #000;
      font-weight: 900;
    }

    .bottom-bar {
      margin-top:auto;
      display:flex;
      justify-content:space-between;
      gap:20px;
    }

    .box-btn {
      flex:1;
      height:110px;
      border-radius:24px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:36px;
      font-weight:900;
      color:#111;
      cursor:pointer;
    }

    @media (max-width: 520px) {
      .page {
        min-height: 100svh;
        padding: 12px 10px 10px;
        gap: 7px;
      }

      .header {

      }

      .title {
        font-size: 24px !important;
      }

      .subtitle {

        top: -4px;

      }

      }

      .back-text {
        font-size: 14px !important;
        margin-top: 10px;
      }

      .steps {

      }

      .step {
        width: 34px;

      }

      .line {
        width: 22px;

      }

      .info-card {
        padding: 10px 12px;
        border-radius: 14px;
        gap: 10px;
      }

      .icon-circle {
        width: 38px !important;
        height: 38px !important;
        font-size: 22px !important;
      }

      .info-label {
        font-size: 14px !important;
        margin-bottom: 3px;
      }

      .info-value {
        font-size: 18px !important;
      }

      .choice-space {

      }

      .message-box {
        min-height: 66px !important;

      }

      }

      }
    }
  
/* ===== SIMULARE TELEFON DESKTOP ===== */
@media (min-width: 701px) {

  body {
    display: flex;

  }

  <!-- BLOC SUPABASE - CONECTARE BAZĂ DE DATE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://hnvqauxqxtdzgyqumkqa.supabase.co',
      'sb_publishable_k1pGTW92yAbLX3PKRQjFpQ_0AQBRker'
    );
  </script>

</head>

<body>
  <div class="page">

    <div class="header" style="position:relative;">
      <div class="nav-back" onclick="goBack()">
        <div class="arrow">«</div>
        <div class="back-text">BACK</div>
      </div>

      <div class="title">Programare nouă</div>
      <div class="subtitle">Trimite confirmare</div>
    </div>

    <div class="steps">
      <div class="step">1</div>
      <div class="line"></div>
      <div class="step">2</div>
      <div class="line"></div>
      <div class="step">3</div>
      <div class="line"></div>
      <div class="step active">4</div>
    </div>

    <div class="info-card">
      <div class="icon-circle">👤</div>
      <div>
        <div class="info-label">Client selectat</div>
        <div class="info-value" id="clientName">-</div>
      </div>
    </div>

    <div class="info-card duration-card">
      <div style="display:flex; align-items:center; gap:13px;">
        <div class="icon-circle">◷</div>
        <div>
          <div class="info-label">Durată selectată</div>
          <div class="info-value"><span id="durationText">-</span></div>
        </div>
      </div>
    </div>

    <div class="choice-space"></div>

    <div class="message-box green" onclick="trimiteWhatsApp()">
      <div class="message-icon">
        <img class="whatsapp-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/5e/WhatsApp_icon.png">
      </div>
      <div class="message-main">Trimite confirmarea clientului pe Whatsapp</div>
    </div>

    <div class="message-box red" onclick="goHome()">
      <div class="message-icon">✖</div>
      <div class="message-main">Nu trimite confirmarea clientului pe Whatsapp</div>
    </div>

    <div class="bottom-bar">
      <div class="box-btn" onclick="goHome()">⌂ HOME</div>
    </div>

  </div>

  <script>
    var durataSelectata = Number(localStorage.getItem('programare_durata') || 60);
    var client = null;

    function init() {
      try {
        client = JSON.parse(localStorage.getItem('programare_client') || 'null');
      } catch(e) {}

      if (!client) {
        window.location.href = 'Programare_noua_premium_pg1.html';
        return;
      }

      document.getElementById('clientName').textContent = client.nume || '-';
      document.getElementById('durationText').textContent = durataSelectata + ' minute';
    }

    function goBack() {
      window.location.href = 'Programare_noua_premium_pg3.html';
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }

    init();
    async function trimiteWhatsApp() {

    var data = JSON.parse(localStorage.getItem('programare_rezultat') || 'null');

    if (!data) {
    alert("Nu există programare.");
    return;
    }

  var mesaj =
  `--- *HAIR CRAFT* ---
  Salut,
  Iti confirm programarea:
  *${data.zi.titlu}, ${data.interval}*
  Daca nu poti ajunge, te rog sa ma anunti din timp.
  Multumesc!`;

  var telefon = (client.telefon || "").replace(/\D/g, "");
  var url = "https://wa.me/" + telefon + "?text=" + encodeURIComponent(mesaj);

  window.open(url, "_blank");

  if (data.id) {
    const { error } = await supabaseClient
      .from('programari')
      .update({ confirmare_trimisa: true })
      .eq('id', data.id);

    if (error) {
      console.log('EROARE CONFIRMARE SUPABASE:', error);
    }
  }
}
  </script>
</body>
