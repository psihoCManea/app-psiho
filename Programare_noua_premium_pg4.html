<body>
  <div class="page">

    <div class="header" style="position:relative;">
      <div class="nav-back" onclick="goBack()">
        <div class="arrow">«</div>
        <div class="back-text">BACK</div>
      </div>

      <div class="title">Programare nouă</div>
      <div class="subtitle">Trimite confirmare</div>
    </div>




    <div class="info-card">
      <div class="icon-circle">👤</div>
      <div>
        <div class="info-label">Client selectat</div>
        <div class="info-value" id="clientName">-</div>
      </div>
    </div>

    <div class="choice-space"></div>

    <div class="message-box green" onclick="trimiteWhatsApp()">
      <div class="message-icon">
        <img class="whatsapp-icon" src="https://upload.wikimedia.org/wikipedia/commons/5/5e/WhatsApp_icon.png">
      </div>
      <div class="message-main">Trimite confirmarea clientului pe Whatsapp</div>
    </div>

    <div class="message-box red" onclick="goHome()">
      <div class="message-icon">✖</div>
      <div class="message-main">Nu trimite confirmarea clientului pe Whatsapp</div>
    </div>

    <div class="bottom-bar">
      <div class="box-btn" onclick="goHome()">⌂ HOME</div>
    </div>

  </div>
  <script>
    var programareCurenta = null;
    var programariMultipleCurente = [];

    function citesteParametruUrl(nume) {
      const params = new URLSearchParams(window.location.search);
      return params.get(nume);
    }

    function formateazaTitluZi(dataIso) {
      if (!dataIso) return '';
      const d = new Date(dataIso + 'T00:00:00');
      const zile = ['Duminică', 'Luni', 'Marți', 'Miercuri', 'Joi', 'Vineri', 'Sâmbătă'];
      const zi = zile[d.getDay()];
      const ziNr = String(d.getDate()).padStart(2, '0');
      const luna = String(d.getMonth() + 1).padStart(2, '0');
      return zi + ' ' + ziNr + '-' + luna;
    }

    function normalizeazaTelefonPentruWhatsapp(telefonInitial) {
      var telefon = String(telefonInitial || '').replace(/[^0-9]/g, '');

      if (telefon.startsWith('0')) {
        telefon = '40' + telefon.substring(1);
      }

      return telefon;
    }

    function construiesteInterval(p) {
      return String(p.ora_start || '').slice(0,5) + ' - ' + String(p.ora_final || '').slice(0,5);
    }

    async function init() {
      const idProgramare = citesteParametruUrl('id');
      const idsProgramari = citesteParametruUrl('ids');

      if (idsProgramari) {
        const ids = idsProgramari
          .split(',')
          .map(function(x) { return x.trim(); })
          .filter(Boolean);

        const { data, error } = await supabaseClient
          .from('programari')
          .select('*')
          .in('id', ids);

        if (error || !data || !data.length) {
          console.log('EROARE CITIRE PROGRAMARI MULTIPLE PG4:', error);
          document.getElementById('clientName').textContent = 'Programările nu au fost găsite';
          return;
        }

        programariMultipleCurente = (data || []).sort(function(a, b) {
          return String(a.data + ' ' + a.ora_start).localeCompare(String(b.data + ' ' + b.ora_start));
        });

        document.getElementById('clientName').textContent = programariMultipleCurente[0].nume_client || '-';
        return;
      }

      if (!idProgramare) {
        document.getElementById('clientName').textContent = 'Lipsește ID programare';
        return;
      }

      const { data, error } = await supabaseClient
        .from('programari')
        .select('*')
        .eq('id', idProgramare)
        .single();

      if (error || !data) {
        console.log('EROARE CITIRE PROGRAMARE PG4:', error);
        document.getElementById('clientName').textContent = 'Programarea nu a fost găsită';
        return;
      }

      programareCurenta = data;
      document.getElementById('clientName').textContent = data.nume_client || '-';
    }

    function goBack() {
      window.location.href = 'Programare_noua_premium_pg3.html';
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }

    async function trimiteWhatsApp() {
      if (programariMultipleCurente && programariMultipleCurente.length) {
        const telefon = normalizeazaTelefonPentruWhatsapp(programariMultipleCurente[0].telefon);

        if (!telefon) {
          console.log('PG4: telefon lipsă pentru programări multiple.');
          return;
        }

        let lista = '';

        programariMultipleCurente.forEach(function(p) {
          lista += '*' + formateazaTitluZi(p.data) + ', ' + construiesteInterval(p) + '*\n';
        });

        const mesaj =
`Buna,
Iti confirm urmatoarele programari:

${lista}
Daca intervine vreo modificare, te rog sa ma anunti din timp.
Multumesc!
Cristian Manea`;

        const ids = programariMultipleCurente.map(function(p) { return p.id; });

        await supabaseClient
          .from('programari')
          .update({ confirmare_trimisa: true })
          .in('id', ids);

        window.open("https://wa.me/" + telefon + "?text=" + encodeURIComponent(mesaj), "_blank");
        return;
      }

      if (!programareCurenta) {
        console.log('PG4: programarea curentă lipsește.');
        return;
      }

      const telefon = normalizeazaTelefonPentruWhatsapp(programareCurenta.telefon);

      if (!telefon) {
        console.log('PG4: telefon lipsă.');
        return;
      }

      const titluZi = formateazaTitluZi(programareCurenta.data);
      const interval = construiesteInterval(programareCurenta);

      const mesaj =
`Buna,
Iti confirm programarea:
*${titluZi}, ${interval}*
Daca intervine ceva, te rog sa ma anunti din timp.
Multumesc!
Cristian Manea`;

      await supabaseClient
        .from('programari')
        .update({ confirmare_trimisa: true })
        .eq('id', programareCurenta.id);

      window.open("https://wa.me/" + telefon + "?text=" + encodeURIComponent(mesaj), "_blank");
    }

    init();
  </script>
</body>
