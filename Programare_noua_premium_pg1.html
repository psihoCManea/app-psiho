<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #f5d37a;
    }

    .page {
      min-height: 100vh;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    .title {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 20px;
      font-size: 20px;
      color: white;
      font-weight: normal;
    }

    .nav-back {
      position:absolute;
      left:0;
      top:-10px;
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
    }

    .arrow {
      font-size:90px;
      font-weight:900;
      color:#f2c94c;
    }

    .back-text {
      color:red;
      font-size:35px;
      font-weight:900;
      margin-top:22px;
    }

    .steps {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 30px 0;
    }

    .step {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
    }

    .step.active {
      background: #f2c94c;
      color: #000;
    }

    .line {
      width: 45px;
      height: 3px;
      background: #d4af37;
    }

    .card {
      border: 2px solid rgba(212,175,55,0.9);
      border-radius: 26px;
      background: linear-gradient(145deg, #202020, #060606);
      padding: 28px;
      margin-bottom: 22px;
    }

    .label {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
      margin-bottom: 16px;
    }

    .input {
      width: 100%;
      height: 95px;
      border-radius: 20px;
      border: 1px solid rgba(212,175,55,0.6);
      background: #080808;
      color: white;
      font-size: 34px;
      padding: 0 20px;
      outline: none;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 22px;
    }

    .result-card {
      border: 2px solid rgba(212,175,55,0.85);
      border-radius: 22px;
      background: linear-gradient(145deg, #1d1d1d, #070707);
      padding: 18px 22px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .result-name {
      font-size: 34px;
      font-weight: 900;
    }

    .result-phone {
      font-size: 26px;
      color: #f2c94c;
      font-weight: 900;
    }

    .selected {
      text-align: center;
      background: linear-gradient(145deg, #3a2a08, #090909);
      border: 3px solid #f2c94c;
      border-radius: 26px;
      padding: 30px;
      box-shadow: 0 0 26px rgba(242,201,76,0.35);
    }

    .selected-title {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #f2c94c;
      margin-bottom: 18px;
    }

    .selected-name {
      font-size: 52px;
      font-weight: 900;
      color: white;
    }

    .selected-phone {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
      margin-top: 10px;
    }

    .bottom-bar {
      margin-top:auto;
      display:flex;
      justify-content:space-between;
      gap:20px;
    }

    .box-btn {
      flex:1;
      height:110px;
      border-radius:24px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:36px;
      font-weight:900;
      color:#111;
    }

  
    /* =========================================================
       FIX GITHUB PWA TELEFON
       Micșorează pagina pentru ecran de telefon în aplicația instalată.
    ========================================================= */
    @media (max-width: 520px) {
      html, body {
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
      }

      .page {
        min-height: 100svh;
        padding: 12px 10px 12px;
        gap: 10px;
      }

      .header {
        margin-bottom: 10px;
        padding-top: 4px;
      }

      .title {
        font-size: 24px !important;
      }

      .subtitle {
        margin-top: 6px;
        font-size: 22px !important;
      }

      .nav-back {
        left: 0;
        top: -4px;
        gap: 3px;
      }

      .arrow {
        font-size: 42px !important;
      }

      .back-text {
        font-size: 14px !important;
        margin-top: 10px;
      }

      .steps {
        margin: 8px 0 10px;
      }

      .step {
        width: 34px;
        height: 34px;
        font-size: 16px;
        border-width: 2px;
      }

      .line {
        width: 22px;
        height: 2px;
      }

      .bottom-bar {
        gap: 10px;
      }

      .box-btn {
        height: 56px;
        border-radius: 14px;
        font-size: 20px;
      }
    }

    @media (max-width: 520px) {
      .card {
        padding: 12px;
        border-radius: 16px;
        margin-bottom: 10px;
      }

      .label {
        font-size: 20px;
        margin-bottom: 8px;
      }

      .input {
        height: 52px;
        border-radius: 12px;
        font-size: 20px;
        padding: 0 12px;
      }

      .results {
        gap: 8px;
        margin-bottom: 10px;
      }

      .result-card {
        padding: 12px;
        border-radius: 14px;
      }

      .result-name {
        font-size: 20px;
      }

      .result-phone {
        font-size: 15px;
      }

      .selected {
        padding: 14px;
        border-radius: 16px;
      }

      .selected-title {
        font-size: 16px;
        margin-bottom: 8px;
      }

      .selected-name {
        font-size: 24px;
      }

      .selected-phone {
        font-size: 20px;
      }
    }

  
/* ===== SIMULARE TELEFON DESKTOP ===== */
@media (min-width: 701px) {

  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  .page {
    width: 430px;
    min-height: calc(100vh - 40px);
    background:
      radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
      linear-gradient(180deg, #080808 0%, #000 100%);
    border: 2px solid rgba(255,255,255,0.18);
    border-radius: 38px;
    box-shadow:
      0 0 0 8px rgba(255,255,255,0.04),
      0 25px 70px rgba(0,0,0,0.65);
    position: relative;
    overflow: hidden;
  }

  .page::before {
    content: '';
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 110px;
    height: 16px;
    border-radius: 0 0 14px 14px;
    background: rgba(0,0,0,0.9);
    z-index: 20;
  }

  .page::after {
    content: '';
    position: absolute;
    top: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 46px;
    height: 4px;
    border-radius: 999px;
    background: rgba(255,255,255,0.18);
    z-index: 21;
  }
}

</style>
</head>

<body>

<div class="page">

  <div class="header" style="position:relative;">
    <div class="nav-back" onclick="goBack()">
      <div class="arrow">«</div>
      <div class="back-text">BACK</div>
    </div>
    <div class="title">Programare nouă</div>
    <div class="subtitle">Alege client</div>
  </div>

  <div class="steps">
    <div class="step active">1</div>
    <div class="line"></div>
    <div class="step">2</div>
    <div class="line"></div>
    <div class="step">3</div>
    <div class="line"></div>
    <div class="step">4</div>
  </div>

  <div class="card">
    <div class="label">Cauta client</div>
    <input id="clientSearch" class="input" placeholder="Ex: Miha" oninput="searchClients()">
  </div>

  <div id="results" class="results"></div>

  <div class="card">
    <div class="label">Client selectat</div>

    <div class="selected">
      <div class="selected-title">CLIENT SELECTAT</div>
      <div class="selected-name">-</div>
      <div class="selected-phone">-</div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="box-btn" onclick="goHome()">⌂ HOME</div>
    <div class="box-btn" onclick="nextStep()">NEXT</div>
  </div>

</div>

<script>
  let clientSelectat = null;
  let clienti = [];

  const SUPABASE_URL = "https://hnvqauxqxtdzgyqumkqa.supabase.co";
  const SUPABASE_KEY = "sb_publishable_TDzH5gP2zi9jwmUVLlWrQA_p4TiPTZ_";

  async function loadClientsFromSupabase() {
    try {
      const res = await fetch(SUPABASE_URL + "/rest/v1/clienti?select=id,nume,telefon&order=nume.asc", {
        headers: {
          apikey: SUPABASE_KEY,
          Authorization: "Bearer " + SUPABASE_KEY
        }
      });

      clienti = await res.json();

    } catch (e) {
      console.log("Eroare incarcare clienti", e);
      clienti = [];
    }
  }

  function searchClients() {
    const text = document.getElementById("clientSearch").value.toLowerCase().trim();
    const box = document.getElementById("results");
    box.innerHTML = "";

    if (text.length < 2) return;

    const gasiti = clienti.filter(c =>
      (c.nume || "").toLowerCase().includes(text)
    );

    gasiti.forEach(client => {
      const div = document.createElement("div");
      div.className = "result-card";
      div.onclick = function() {
        selectClient(client);
      };

      div.innerHTML = `
        <div class="result-name">${client.nume || ""}</div>
        <div class="result-phone">${client.telefon || ""}</div>
      `;

      box.appendChild(div);
    });
  }

  function selectClient(client) {
    document.querySelector(".selected-name").innerText = client.nume || "";
    document.querySelector(".selected-phone").innerText = client.telefon || "";
    clientSelectat = client;
    localStorage.setItem("programare_client", JSON.stringify(client));
  }

function goBack() {
  window.location.href = 'index_premium.html';
  }

  function goHome() {
    window.location.href = 'index_premium.html';
  }

  function nextStep() {
    if (!clientSelectat) {
      alert('Alege clientul înainte de NEXT.');
      return;
    }
    window.location.href = 'Programare_noua_premium_pg2.html';
  }

  loadClientsFromSupabase();
</script>

</body>
</html>
