<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 22px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    .title {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 20px;
      font-size: 50px;
      color: white;
      font-weight: normal;
    }

    .nav-back {
      position:absolute;
      left:0;
      top:-10px;
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
    }

    .arrow {
      font-size:90px;
      font-weight:900;
      color:#f2c94c;
    }

    .back-text {
      color:red;
      font-size:35px;
      font-weight:900;
      margin-top:22px;
    }

    .steps {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 30px 0;
    }

    .step {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
      color: #f5d37a;
    }

    .step.active {
      background: #f2c94c;
      color: #000;
    }

    .line {
      width: 45px;
      height: 3px;
      background: #d4af37;
    }


    /* BLOC CLIENT - CĂUTARE ȘI SELECTARE CLIENT ÎN PG3 */
    .client-search-card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 12px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .client-search-label {
      font-size: 14px;
      color: #f4c363;
      font-weight: 900;
      margin-bottom: 7px;
      text-transform: uppercase;
    }

    .client-search-input {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid rgba(244,195,99,0.65);
      background: #080808;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      padding: 0 12px;
      outline: none;
    }

    .client-results {
      display: flex;
      flex-direction: column;
      gap: 7px;
      max-height: 105px;
      overflow-y: auto;
      margin-top: 8px;
    }

    .client-result-card {
      border: 1px solid rgba(244,195,99,0.75);
      border-radius: 12px;
      background: linear-gradient(145deg, #1a1a1a, #070707);
      padding: 9px 10px;
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .client-result-name {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.1;
    }

    .client-result-phone {
      font-size: 12px;
      color: #f4c363;
      font-weight: 900;
      white-space: nowrap;
    }

    .client-selected-box {
      margin-top: 8px;
      border: 1px solid rgba(244,195,99,0.85);
      border-radius: 12px;
      padding: 9px 10px;
      background: linear-gradient(145deg, #3a2a08, #090909);
      color: white;
      text-align: center;
    }

    .client-selected-title {
      font-size: 11px;
      color: #f4c363;
      font-weight: 900;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .client-selected-name {
      font-size: 18px;
      font-weight: 900;
      line-height: 1.1;
    }

    .client-selected-phone {
      font-size: 14px;
      color: #f4c363;
      font-weight: 900;
      margin-top: 3px;
    }

    .info-card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 18px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .info-card.duration-card {
      justify-content: space-between;
    }

    .icon-circle {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffe28a, #d99a35);
      color: #071320;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      font-weight: 900;
    }

    .info-label {
      font-size: 21px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 6px;
      font-weight: 800;
    }

    .info-value {
      font-size: 30px;
      font-weight: 900;
      color: #fff;
      line-height: 1.05;
    }

    .change-btn {
      border: 2px solid #f4c363;
      border-radius: 18px;
      padding: 18px 28px;
      color: #f4c363;
      font-size: 32px;
      font-weight: 900;
      background: rgba(244,195,99,0.08);
      cursor: pointer;
    }

    .section-title {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #f4c363;
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .days-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-card {
      position: relative;
      min-height: 96px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      background: rgba(12, 24, 38, 0.86);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.17);
    }

    .day-card.selected {
      border: 2px solid #f4c363;
    }

    .day-card.selected::after {
      content: "";
      position: absolute;
      bottom: -7px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f4c363;
    }

    .day-name {
      font-size: 24px;
      margin-bottom: 5px;
      font-weight: 900;
    }

    .day-number {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .day-month {
      margin-top: 5px;
      font-size: 24px;
      font-weight: 900;
      color: rgba(255,255,255,0.9);
    }

    .availability-title {
      margin-top: 6px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: #f4c363;
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.28;
    }

    .slots-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      flex: 1;
    }

    .slot {
      height: 80px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(12, 24, 38, 0.76);
      color: rgba(255,255,255,1);
      font-size: 42px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      letter-spacing: -0.5px;
    }

    .slot.occupied {
      color: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.035);
      cursor: not-allowed;
    }

    .slot.selected-range {
      border: 4px solid #ff2020;
      color: rgba(255,255,255,1);
      background: #1fae4b;
      color: #fff;
      border: 4px solid #1fae4b;
    }
    .slot.conflict {
      border: 4px solid #ff2020;
      background: #ff2020 !important;
      color: #fff;
    }

    .slot.confirmed {
      color: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.035);
      cursor: not-allowed;
    }

    .message-box {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 20px 18px;
      display: flex;
      align-items: center;
      gap: 13px;
      background: rgba(10, 22, 36, 0.9);
      min-height: 150px;
    }

    .message-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2px solid #f4c363;
      color: #f4c363;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 31px;
      flex-shrink: 0;
      font-weight: 900;
    }

    .message-main {
      font-size: 35px;
      line-height: 1.08;
      color: #fff;
      font-weight: 900;
    }

    .message-red {
      color: #ff4040;
      font-weight: 900;
    }

    .message-green {
      color: #58d45f;
      font-weight: 900;
    }

    .confirm-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 19px 16px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(0,0,0,0.34);
    }

    .confirm-btn.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.25);
    }

    .confirm-icon {
      font-size: 33px;
      color: #000 !important;
    }

    .confirm-title {
      font-size: 23px;
      line-height: 1.05;
    }

    .confirm-sub {
      font-size: 15px;
      font-weight: 600;
      margin-top: 5px;
    }

    .bottom-bar {
      display:flex;
      justify-content:space-between;
      gap:20px;
    }

    .box-btn {
      flex:1;
      height:110px;
      border-radius:24px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:36px;
      font-weight:900;
      color:#111;
      cursor:pointer;
    }

    @media (max-width: 430px) {
      .info-label {
        font-size: 22px;
      }

      .info-value {
        font-size: 30px;
      }

      .icon-circle {
        width: 52px;
        height: 52px;
        font-size: 29px;
      }

      .change-btn {
        font-size: 24px;
        padding: 14px 20px;
      }

      .day-card {
        min-height: 86px;
      }

      .day-name {
        font-size: 18px;
      }

      .day-number {
        font-size: 24px;
      }

      .day-month {
        font-size: 18px;
      }

      .slot {
        height: 86px;
        font-size: 31px;
      }

      .message-main {
        font-size: 25px;
      }

      .message-box {
        min-height: 126px;
      }
    }

    @media (max-width: 390px) {
      .page {
        padding: 18px 12px 14px;
        gap: 10px;
      }

      .title {
        font-size: 25px;
      }

      .slot {
        height: 78px;
        font-size: 28px;
      }

      .message-main {
        font-size: 34px;
      }
    }

    <div class="availability-title">
      <span>◷</span>
      <span id="availabilityTitle">Ore disponibile pentru<br>SÂMBĂTĂ, 18 MAI</span>
    </div>

    <div class="slots-grid" id="slotsGrid"></div>

    <div class="message-box">
      <div class="message-icon" id="messageIcon">i</div>
      <div class="message-main" id="messageText">Alege ora.</div>
    </div>

    <button class="confirm-btn disabled" id="confirmBtn" onclick="confirmAppointment()">
      <div class="confirm-icon">✔</div>
      <div>
        <div class="confirm-title">CONFIRMĂ PROGRAMAREA</div>
      </div>
    </button>

    <div class="bottom-bar">
      <div class="box-btn" onclick="goHome()">⌂ HOME</div>
      <div class="box-btn" onclick="nextStep()">NEXT</div>
    </div>

  </div>

  <script>
    var durataSelectata = 60;
    localStorage.setItem('programare_durata', '60');
    var sloturiNecesare = 1;
    var client = null;
    var clienti = [];
    var ziSelectataIndex = 0;
    var oraSelectataIndex = null;
    var confirmata = false;

    var zile = [];
    var zileNume = ['Du', 'Lu', 'Ma', 'Mi', 'Joi', 'Vi', 'Sa'];
    var zileTitlu = ['DUMINICĂ', 'LUNI', 'MARȚI', 'MIERCURI', 'JOI', 'VINERI', 'SÂMBĂTĂ'];
    var luni = ['Ian', 'Feb', 'Mar', 'Apr', 'Mai', 'Iun', 'Iul', 'Aug', 'Sep', 'Oct', 'Noi', 'Dec'];
    var luniTitlu = ['IANUARIE', 'FEBRUARIE', 'MARTIE', 'APRILIE', 'MAI', 'IUNIE', 'IULIE', 'AUGUST', 'SEPTEMBRIE', 'OCTOMBRIE', 'NOIEMBRIE', 'DECEMBRIE'];

    var sloturi = [
      '08:00', '09:00', '10:00', '11:00',
      '12:00', '13:00', '14:00', '15:00',
      '16:00', '17:00', '18:00', '19:00',
      '20:00', '21:00'
    ];

    var ocupatePeZile = [[], [], [], [], [], [], []];

    async function init() {
      try { client = JSON.parse(localStorage.getItem('programare_client') || 'null'); } catch(e) {}

      await loadClientsFromSupabase();

      if (client) {
        afiseazaClientSelectat(client);
      }

      buildDynamicDays();
      await incarcaOcupateDinSupabase();
      renderDays();
      renderSlots();
      updateAvailabilityTitle();
    }

    /* BLOC CLIENT - CITIRE CLIENȚI DIN SUPABASE */
    async function loadClientsFromSupabase() {
      try {
        const { data, error } = await supabaseClient
          .from('clienti')
          .select('id, nume, telefon')
          .order('nume', { ascending: true });

        if (error) {
          console.log('EROARE CLIENTI SUPABASE:', error);
          clienti = [];
          return;
        }

        clienti = data || [];
      } catch(e) {
        console.log('EROARE INCARCARE CLIENTI:', e);
        clienti = [];
      }
    }

    /* BLOC CLIENT - CĂUTARE CLIENT */
    function searchClients() {
      const input = document.getElementById('clientSearch');
      const box = document.getElementById('clientResults');
      if (!input || !box) return;

      const text = input.value.toLowerCase().trim();
      box.innerHTML = '';

      if (text.length < 2) return;

      const gasiti = clienti.filter(function(c) {
        return (c.nume || '').toLowerCase().includes(text);
      }).slice(0, 8);

      gasiti.forEach(function(c) {
        const div = document.createElement('div');
        div.className = 'client-result-card';
        div.onclick = function() {
          selectClient(c);
        };

        div.innerHTML =
          '<div class="client-result-name">' + (c.nume || '') + '</div>' +
          '<div class="client-result-phone">' + (c.telefon || '') + '</div>';

        box.appendChild(div);
      });
    }

    /* BLOC CLIENT - SELECTARE CLIENT */
    function selectClient(c) {
      client = c;
      localStorage.setItem('programare_client', JSON.stringify(c));
      afiseazaClientSelectat(c);

      const box = document.getElementById('clientResults');
      const input = document.getElementById('clientSearch');

      if (box) box.innerHTML = '';
      if (input) input.value = '';
    }

    function afiseazaClientSelectat(c) {
      document.getElementById('clientName').textContent = c && c.nume ? c.nume : '-';
      document.getElementById('clientPhone').textContent = c && c.telefon ? c.telefon : '-';
    }

    function buildDynamicDays() {
      zile = [];
      var azi = new Date();

      for (var i = 0; i < 7; i++) {
        var d = new Date(azi);
        d.setDate(azi.getDate() + i);

        var ziIndex = d.getDay();
        var lunaIndex = d.getMonth();
        var nr = String(d.getDate());

        zile.push({
          nume: zileNume[ziIndex],
          nr: nr,
          luna: luni[lunaIndex],
          titlu: zileTitlu[ziIndex] + ', ' + nr + ' ' + luniTitlu[lunaIndex],
          dataIso: formatDateIso(d)
        });
      }
    }

    function renderDays() {
      var wrap = document.getElementById('daysRow');
      wrap.innerHTML = '';

      zile.forEach(function(zi, index) {
        var div = document.createElement('div');
        div.className = 'day-card' + (index === ziSelectataIndex ? ' selected' : '');
        div.onclick = function() { selectDay(index); };

        div.innerHTML =
          '<div class="day-name">' + zi.nume + '</div>' +
          '<div class="day-number">' + zi.nr + '</div>' +
          '<div class="day-month">' + zi.luna + '</div>';

        wrap.appendChild(div);
      });
    }

    function renderSlots() {
      var grid = document.getElementById('slotsGrid');
      grid.innerHTML = '';

      var ocupate = getOcupatePentruZi();

      sloturi.forEach(function(slot, index) {
        var div = document.createElement('div');
        div.className = 'slot';

        if (ocupate.indexOf(index) !== -1) {
          div.classList.add('occupied');
        }

        if (confirmata && esteInInterval(index)) {
          div.classList.add('confirmed');
        } else if (!confirmata && esteInInterval(index)) {
          if (!intervalEsteLiber()) {
            div.classList.add('conflict');
          } else {
            div.classList.add('selected-range');
          }
        }

        div.textContent = slot;
        div.onclick = function() { selectSlot(index); };

        grid.appendChild(div);
      });
    }

    function selectDay(index) {
      ziSelectataIndex = index;
      oraSelectataIndex = null;
      confirmata = false;

      renderDays();
      updateAvailabilityTitle();
      renderSlots();
      resetMessage();
      setConfirmEnabled(false);
      resetButton();
    }

    function selectSlot(index) {
      if (confirmata) return;

      oraSelectataIndex = index;
      renderSlots();

      if (!intervalEsteLiber()) {
        updateMessageOccupied();
        setConfirmEnabled(false);
        speakText('Interval ocupat');
        return;
      }

      updateMessageFree();
      setConfirmEnabled(true);
    }

    function esteInInterval(index) {
      if (oraSelectataIndex === null) return false;
      return index >= oraSelectataIndex && index < oraSelectataIndex + sloturiNecesare;
    }

    function intervalEsteLiber() {
      if (oraSelectataIndex === null) return false;

      var ocupate = getOcupatePentruZi();

      if (oraSelectataIndex + sloturiNecesare > sloturi.length) {
        return false;
      }

      for (var i = 0; i < sloturiNecesare; i++) {
        if (ocupate.indexOf(oraSelectataIndex + i) !== -1) {
          return false;
        }
      }

      return true;
    }

    /* BLOC SUPABASE - CITIRE SLOTURI OCUPATE */
    async function incarcaOcupateDinSupabase() {
      ocupatePeZile = [[], [], [], [], [], [], []];

      try {
        var dateStart = zile[0].dataIso;
        var dateFinal = zile[zile.length - 1].dataIso;

        const { data, error } = await supabaseClient
          .from('programari')
          .select('data, ora_start, ora_final, status')
          .gte('data', dateStart)
          .lte('data', dateFinal)
          .neq('status', 'stearsa');

        if (error) {
          console.log('EROARE SUPABASE OCUPATE:', error);
          return;
        }

        (data || []).forEach(function(programare) {
          if (!programare || !programare.data || !programare.ora_start || !programare.ora_final) return;

          var ziIndex = zile.findIndex(function(zi) {
            return zi.dataIso === programare.data;
          });

          if (ziIndex === -1) return;

          var startIndex = sloturi.indexOf(programare.ora_start.slice(0, 5));
          var finalIndex = sloturi.indexOf(programare.ora_final.slice(0, 5));

          if (startIndex === -1) return;
          if (finalIndex === -1) {
            finalIndex = sloturi.length;
          }

          for (var i = startIndex; i < finalIndex; i++) {
            ocupatePeZile[ziIndex].push(i);
          }
        });

        /* BLOC SUPABASE - CITIRE INDISPONIBILITATI */
        const { data: indisponibilitati, error: errorIndisponibilitati } = await supabaseClient
          .from('indisponibilitati')
          .select('tip, data_start, data_final, ora_start, ora_final, activa')
          .eq('activa', true)
          .gte('data_final', dateStart)
          .lte('data_start', dateFinal);

        if (errorIndisponibilitati) {
          console.log('EROARE SUPABASE INDISPONIBILITATI:', errorIndisponibilitati);
          return;
        }

        (indisponibilitati || []).forEach(function(blocare) {
          if (!blocare || !blocare.data_start || !blocare.data_final) return;

          zile.forEach(function(zi, ziIndex) {
            if (zi.dataIso < blocare.data_start || zi.dataIso > blocare.data_final) return;

            if (blocare.tip === 'interval') {
              if (!blocare.ora_start || !blocare.ora_final) return;

              var startIndex = sloturi.indexOf(blocare.ora_start.slice(0, 5));
              var finalIndex = sloturi.indexOf(blocare.ora_final.slice(0, 5));

              if (startIndex === -1) return;
              if (finalIndex === -1) {
                finalIndex = sloturi.length;
              }

              for (var i = startIndex; i < finalIndex; i++) {
                ocupatePeZile[ziIndex].push(i);
              }
            }

            if (blocare.tip === 'zi' || blocare.tip === 'concediu') {
              for (var j = 0; j < sloturi.length; j++) {
                ocupatePeZile[ziIndex].push(j);
              }
            }
          });
        });
      } catch(e) {
        console.log('EROARE SUPABASE OCUPATE:', e);
      }
    }

    function getOcupatePentruZi() {
      var ocupate = ocupatePeZile[ziSelectataIndex].slice();

      if (ziSelectataIndex === 0) {
        var acum = new Date();
        var minuteCurente = acum.getHours() * 60 + acum.getMinutes();

        sloturi.forEach(function(slot, index) {
          var parti = slot.split(':');
          var minuteSlot = Number(parti[0]) * 60 + Number(parti[1]);

          if (minuteSlot < minuteCurente) {
            ocupate.push(index);
          }
        });
      }

      return ocupate;
    }

    function formatDateIso(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var zi = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + zi;
    }

    function getEndTime(startIndex) {
      var totalMinutes = 8 * 60 + (startIndex * 60) + durataSelectata;
      var h = Math.floor(totalMinutes / 60);
      var m = totalMinutes % 60;

      return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    function getIntervalText() {
      if (oraSelectataIndex === null) return '';
      return sloturi[oraSelectataIndex] + ' - ' + getEndTime(oraSelectataIndex);
    }

    function speakText(text) {
      try {
        var msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ro-RO';
        msg.rate = 0.9;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
      } catch(e) {}
    }

    function updateAvailabilityTitle() {
      document.getElementById('availabilityTitle').innerHTML =
        'Ore disponibile pentru<br>' + zile[ziSelectataIndex].titlu;
    }

    function resetMessage() {
      document.getElementById('messageIcon').textContent = 'i';
      document.getElementById('messageIcon').style.borderColor = '#f4c363';
      document.getElementById('messageIcon').style.color = '#f4c363';
      document.getElementById('messageText').innerHTML = 'Alege ora.';
    }

    function updateMessageFree() {
      document.getElementById('messageIcon').textContent = 'i';
      document.getElementById('messageIcon').style.borderColor = '#f4c363';
      document.getElementById('messageIcon').style.color = '#f4c363';
      document.getElementById('messageText').innerHTML =
        '<span class="message-red">' + getIntervalText() + '</span><br>' +
        '<span class="message-green">Interval liber</span>';
    }

    function updateMessageOccupied() {
      document.getElementById('messageIcon').textContent = '!';
      document.getElementById('messageIcon').style.borderColor = '#ff4040';
      document.getElementById('messageIcon').style.color = '#ff4040';
      document.getElementById('messageText').innerHTML =
        '<span class="message-red">Interval ocupat</span><br>' +
        getIntervalText();
    }

    function updateMessageConfirmed() {
      document.getElementById('messageIcon').textContent = '✓';
      document.getElementById('messageIcon').style.borderColor = '#58d45f';
      document.getElementById('messageIcon').style.color = '#58d45f';
      document.getElementById('messageText').innerHTML =
        '<span class="message-green">Confirmat!</span><br>' +
        getIntervalText();
    }

    function setConfirmEnabled(enabled) {
      var btn = document.getElementById('confirmBtn');

      if (enabled) {
        btn.classList.remove('disabled');
      } else {
        btn.classList.add('disabled');
      }
    }

    async function confirmAppointment() {
      if (!client) {
        document.getElementById('messageIcon').textContent = '!';
        document.getElementById('messageIcon').style.borderColor = '#ff4040';
        document.getElementById('messageIcon').style.color = '#ff4040';
        document.getElementById('messageText').innerHTML =
          '<span class="message-red">Alege clientul !</span>';
        return;
      }

      if (oraSelectataIndex === null) return;

      if (!intervalEsteLiber()) {
        speakText('Interval ocupat');
        return;
      }

      confirmata = true;
      renderSlots();
      updateMessageConfirmed();

      var btn = document.getElementById('confirmBtn');
      btn.classList.add('disabled');
      btn.querySelector('.confirm-title').textContent = 'PROGRAMARE CONFIRMATĂ';

      var programareNoua = {
        client: client,
        durata: durataSelectata,
        zi: zile[ziSelectataIndex],
        interval: getIntervalText()
      };

      localStorage.setItem('programare_rezultat', JSON.stringify(programareNoua));

      /* BLOC SUPABASE - SALVARE PROGRAMARE */
      try {
        const { data, error } = await supabaseClient
          .from('programari')
          .insert([
            {
              nume_client: client.nume || '',
              telefon: client.telefon || '',
              data: zile[ziSelectataIndex].dataIso,
              ora_start: sloturi[oraSelectataIndex],
              ora_final: getEndTime(oraSelectataIndex),
              status: 'noua',
              reminder_trimis: ziSelectataIndex === 0,
              confirmare_trimisa: false
            }
          ])
          .select('id')
          .single();

        if (error) {
          console.log('EROARE SUPABASE PROGRAMARE:', error);
        } else if (data && data.id) {
          programareNoua.id = data.id;
          localStorage.setItem('programare_rezultat', JSON.stringify(programareNoua));
        }
      } catch(e) {
        console.log('EROARE SUPABASE PROGRAMARE:', e);
      }


      for (var i = 0; i < sloturiNecesare; i++) {
        ocupatePeZile[ziSelectataIndex].push(oraSelectataIndex + i);
      }
    }

    function resetButton() {
      var btn = document.getElementById('confirmBtn');
      btn.querySelector('.confirm-title').textContent = 'CONFIRMĂ PROGRAMAREA';
    }

    function changeDuration() {
      document.getElementById('messageIcon').textContent = 'i';
      document.getElementById('messageIcon').style.borderColor = '#f4c363';
      document.getElementById('messageIcon').style.color = '#f4c363';
      document.getElementById('messageText').innerHTML = 'Durata este fixă: 60 minute.';
    }

    function goBack() {
      window.location.href = 'index_premium.html';
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }

    function nextStep() {
      if (!client) {
        document.getElementById('messageIcon').textContent = '!';
        document.getElementById('messageIcon').style.borderColor = '#ff4040';
        document.getElementById('messageIcon').style.color = '#ff4040';
        document.getElementById('messageText').innerHTML =
          '<span class="message-red">Alege clientul !</span>';
        return;
      }

      if (!confirmata) {
        document.getElementById('messageIcon').textContent = '!';
        document.getElementById('messageIcon').style.borderColor = '#ff4040';
        document.getElementById('messageIcon').style.color = '#ff4040';
        document.getElementById('messageText').innerHTML =
          '<span class="message-red">Confirmă programarea !</span>';

        speakText('Confirmă programarea');
        return;
      }

      window.location.href = 'Programare_noua_premium_pg4.html';
    }

    init();
  </script>
</body>
</html>
