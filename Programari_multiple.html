<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta charset="UTF-8">
  <title>Programări multiple</title>

  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
      overflow-x: hidden;
    }

    body { min-height: 100vh; }

    .page {
      min-height: 100vh;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .header {
      position: relative;
      text-align: center;
      margin-bottom: 2px;
    }

    .nav-back {
      position: absolute;
      left: 0;
      top: -4px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .arrow {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
    }

    .back-text {
      color: #ff0000;
      font-size: 14px;
      font-weight: 900;
      margin-top: 10px;
    }

    .title {
      font-size: 24px;
      font-weight: 900;
      color: #f2c94c;
      line-height: 1.05;
    }

    .subtitle {
      margin-top: 5px;
      font-size: 15px;
      color: #ffffff;
      font-weight: 800;
    }

    .client-card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 13px;
      padding: 8px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .client-label {
      font-size: 11px;
      color: #f4c363;
      font-weight: 900;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .client-input {
      width: 100%;
      height: 36px;
      border-radius: 10px;
      border: 1px solid rgba(244,195,99,0.65);
      background: #080808;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      padding: 0 11px;
      outline: none;
    }

    .client-results {
      display: flex;
      flex-direction: column;
      gap: 5px;
      max-height: 78px;
      overflow-y: auto;
      margin-top: 6px;
    }

    .client-result-card {
      border: 1px solid rgba(244,195,99,0.75);
      border-radius: 10px;
      background: linear-gradient(145deg, #1a1a1a, #070707);
      padding: 7px 8px;
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .client-result-name {
      font-size: 13px;
      font-weight: 900;
      line-height: 1.1;
    }

    .client-result-phone {
      font-size: 10px;
      color: #f4c363;
      font-weight: 900;
      white-space: nowrap;
    }

    .client-selected-box {
      margin-top: 5px;
      border: 1px solid rgba(244,195,99,0.85);
      border-radius: 10px;
      padding: 5px 8px;
      background: linear-gradient(145deg, #3a2a08, #090909);
      color: white;
    }

    .client-selected-title {
      text-align: center;
      font-size: 9px;
      color: #f4c363;
      font-weight: 900;
      margin-bottom: 3px;
      letter-spacing: 1px;
    }

    .client-selected-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .client-selected-name {
      flex: 1;
      min-width: 0;
      text-align: left;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .client-selected-phone {
      flex-shrink: 0;
      text-align: right;
      font-size: 10px;
      color: #f4c363;
      font-weight: 900;
      line-height: 1.05;
      white-space: nowrap;
    }

    .month-buttons {
      display: flex;
      justify-content: center;
      gap: 7px;
      margin-top: 0;
      margin-bottom: 0;
    }

    .month-btn {
      min-width: 86px;
      height: 34px;
      padding: 0 10px;
      border-radius: 13px;
      border: 1px solid rgba(242,201,76,0.85);
      background: rgba(0,0,0,0.45);
      color: #f2c94c;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .month-btn.active {
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
    }

    .orar-wrapper {
      width: 100%;
      overflow: auto;
      border: 1px solid #f2c94c;
      border-radius: 14px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 10px 24px rgba(0,0,0,0.42);
      flex: 1;
      min-height: 260px;
    }

    .orar-grid {
      display: grid;
      grid-template-columns: 74px repeat(7, 76px);
      min-width: 606px;
    }

    .cell {
      min-height: 46px;
      padding: 4px 3px;
      border-right: 1px solid rgba(242,201,76,0.35);
      border-bottom: 1px solid rgba(242,201,76,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 10px;
      font-weight: 900;
      color: #111;
      line-height: 1.12;
      white-space: normal;
      word-break: break-word;
    }

    .hour-cell {
      position: sticky;
      left: 0;
      z-index: 3;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 9.5px;
      font-weight: 900;
    }

    .head-cell {
      position: sticky;
      top: 0;
      z-index: 2;
      min-height: 34px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 10px;
      font-weight: 900;
      flex-direction: column;
      gap: 2px;
      border-bottom: 2px solid black;
    }

    .head-cell.hour-cell { z-index: 4; }

    .day-name { font-size: 11px; font-weight: 900; line-height: 1; }
    .day-date { font-size: 9px; font-weight: 900; line-height: 1; }

    .free {
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      cursor: pointer;
    }

    .busy {
      background: rgba(0, 0, 0, 0.5);
      color: #f2c94c;
      cursor: not-allowed;
    }

    .reserved {
      background: linear-gradient(145deg, #1fae4b, #0b5d25);
      color: #ffffff;
      cursor: pointer;
    }

    .busy-past {
      background: rgba(128, 128, 128, 0.65);
      color: #f2c94c;
      cursor: not-allowed;
    }

    .slot-text {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      width: 100%;
      max-height: 28px;
      font-size: 10px;
      line-height: 1.15;
      font-weight: 900;
    }

    .col-sep {
      box-shadow: inset -2px 0 0 #000 !important;
      z-index: 5;
    }

    .app-message {
      min-height: 38px;
      border-radius: 12px;
      border: 1px solid rgba(244,195,99,0.55);
      background: rgba(10, 22, 36, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 900;
      color: #f4c363;
    }

    .app-message.error {
      color: #ff4040;
      border-color: rgba(255,64,64,0.75);
    }

    .app-message.ok {
      color: #58d45f;
      border-color: rgba(88,212,95,0.75);
    }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-top: 0;
    }

    .box-btn {
      flex: 1;
      height: 46px;
      border-radius: 13px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
      color: #111;
      cursor: pointer;
      border: none;
    }

    .box-btn.secondary {
      background: linear-gradient(145deg, #1a1a1a, #070707);
      color: #f2c94c;
      border: 1px solid #f2c94c;
    }

    
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
    }

    .confirm-modal {
      width: 100%;
      max-width: 430px;
      border-radius: 18px;
      border: 1px solid rgba(242,201,76,0.8);
      background: linear-gradient(180deg, #111111 0%, #050505 100%);
      box-shadow: 0 20px 50px rgba(0,0,0,0.75);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .confirm-title {
      text-align: center;
      font-size: 19px;
      font-weight: 900;
      color: #f2c94c;
    }

    .confirm-client {
      text-align: center;
      font-size: 13px;
      font-weight: 900;
      color: #ffffff;
    }

    .confirm-list {
      max-height: 340px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .confirm-item {
      border: 1px solid rgba(242,201,76,0.55);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .confirm-day {
      font-size: 13px;
      font-weight: 900;
      color: #f2c94c;
    }

    .confirm-hour {
      font-size: 15px;
      font-weight: 900;
      color: #ffffff;
    }

    .confirm-row-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .modify-btn {
      border: 1px solid rgba(242,201,76,0.85);
      border-radius: 9px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 11px;
      font-weight: 900;
      padding: 7px 10px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .confirm-buttons {
      display: flex;
      gap: 10px;
    }


    @media (min-width: 701px) {
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
        background: #000000;
      }

      .page {
        position: relative;
        width: 430px;
        max-width: 430px;
        height: 920px;
        min-height: 920px;
        max-height: 920px;
        margin: 0 auto;
        border-radius: 48px;
        padding: 74px 16px 18px;
        background:
          linear-gradient(180deg, rgba(18,18,18,0.98) 0%, rgba(7,7,7,0.98) 100%);
        border: 3px solid rgba(242,201,76,0.92);
        box-shadow:
          0 0 0 3px rgba(255,255,255,0.05),
          0 0 0 12px #000000,
          0 0 35px rgba(242,201,76,0.30),
          0 45px 90px rgba(0,0,0,0.85);
        overflow: hidden;
        transform-origin: center center;
        transform: scale(min(calc((100vw - 80px) / 430), calc((100vh - 80px) / 920)));
        gap: 8px;
      }

      .page::before {
        content: "";
        position: absolute;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        width: 170px;
        height: 35px;
        background: #000000;
        border-radius: 28px;
        z-index: 5;
      }

      .page::after {
        content: "";
        position: absolute;
        top: 36px;
        left: 50%;
        transform: translateX(-50%);
        width: 58px;
        height: 7px;
        background: #222222;
        border-radius: 20px;
        z-index: 6;
      }
    }
  </style>

<body>
  <div class="page">

    <div class="header">
      <div class="nav-back" onclick="goHome()">
        <div class="arrow">«</div>
        <div class="back-text">BACK</div>
      </div>
      <div class="title">Programări multiple</div>
      <div class="subtitle">Selectează clientul și orele libere</div>
    </div>

    <div class="client-card">
      <div class="client-label">Caută client</div>
      <input id="clientSearch" class="client-input" placeholder="Ex: Cris" oninput="searchClients()">
      <div id="clientResults" class="client-results"></div>

      <div class="client-selected-box">
        <div class="client-selected-title">CLIENT SELECTAT</div>
        <div class="client-selected-row">
          <div class="client-selected-name" id="clientName">-</div>
          <div class="client-selected-phone" id="clientPhone">-</div>
        </div>
      </div>
    </div>

    <div id="monthButtons" class="month-buttons"></div>

    <div class="orar-wrapper">
      <div id="orarGrid" class="orar-grid"></div>
    </div>

    <div id="appMessage" class="app-message">Selectează clientul, apoi apasă pe orele libere.</div>

    <div class="bottom-bar">
      <button class="box-btn secondary" onclick="goHome()">HOME</button>
      <button class="box-btn" onclick="gataSelectii()">GATA</button>
    </div>

  
    <div id="confirmOverlay" class="confirm-overlay">
      <div class="confirm-modal">

        <div class="confirm-title">Verifică programările</div>

        <div class="confirm-client" id="confirmClientName">-</div>

        <div class="confirm-list" id="confirmList"></div>

        <div class="confirm-buttons">
          <button class="box-btn secondary" onclick="inchideConfirmare()">ÎNAPOI</button>
          <button class="box-btn" onclick="confirmareFinala()">PROGRAMEAZĂ</button>
        </div>

      </div>
    </div>


  <script>
    const ORA_START = 8;
    const ORA_FINAL = 22;
    const DURATA_SLOT = 60;
    const NUMAR_ZILE_AFISATE = 90;

    let clientSelectat = null;
    let clienti = [];
    let lunaSelectataOffset = 0;
    let selectiiTemporare = [];

    const ZILE_SCURT = ['Du', 'Lu', 'Ma', 'Mi', 'Jo', 'Vi', 'Sa'];
    const LUNI = ['ian', 'feb', 'mar', 'apr', 'mai', 'iun', 'iul', 'aug', 'sep', 'oct', 'nov', 'dec'];
    const LUNI_BUTOANE = ['Ianuarie', 'Februarie', 'Martie', 'Aprilie', 'Mai', 'Iunie', 'Iulie', 'August', 'Septembrie', 'Octombrie', 'Noiembrie', 'Decembrie'];

    function afiseazaMesaj(text, tip) {
      const box = document.getElementById('appMessage');
      if (!box) return;

      box.className = 'app-message';

      if (tip === 'error') box.classList.add('error');
      if (tip === 'ok') box.classList.add('ok');

      box.innerText = text;
    }

    async function loadClientsFromSupabase() {
      try {
        const { data, error } = await supabaseClient
          .from('clienti')
          .select('id, nume, telefon')
          .order('nume', { ascending: true });

        if (error) {
          console.log('EROARE CLIENTI SUPABASE:', error);
          clienti = [];
          return;
        }

        clienti = data || [];
      } catch(e) {
        console.log('EROARE INCARCARE CLIENTI:', e);
        clienti = [];
      }
    }

    function searchClients() {
      const input = document.getElementById('clientSearch');
      const box = document.getElementById('clientResults');
      if (!input || !box) return;

      const text = input.value.toLowerCase().trim();
      box.innerHTML = '';

      if (text.length < 2) return;

      const gasiti = clienti.filter(function(c) {
        return (c.nume || '').toLowerCase().includes(text);
      }).slice(0, 8);

      gasiti.forEach(function(c) {
        const div = document.createElement('div');
        div.className = 'client-result-card';
        div.onclick = function() {
          selectClient(c);
        };

        div.innerHTML =
          '<div class="client-result-name">' + escapeHtml(c.nume || '') + '</div>' +
          '<div class="client-result-phone">' + escapeHtml(c.telefon || '') + '</div>';

        box.appendChild(div);
      });
    }

    function selectClient(c) {
      clientSelectat = c;

      document.getElementById('clientName').textContent = c && c.nume ? c.nume : '-';
      document.getElementById('clientPhone').textContent = c && c.telefon ? c.telefon : '-';

      const box = document.getElementById('clientResults');
      const input = document.getElementById('clientSearch');

      if (box) box.innerHTML = '';
      if (input) input.value = '';

      afiseazaMesaj('Client selectat. Apasă pe orele libere pentru rezervare.', 'ok');
    }

    function getToateZilele90() {
      const zile = [];

      for (let i = 0; i < NUMAR_ZILE_AFISATE; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);
        const dataCurenta = new Date(d.getFullYear(), d.getMonth(), d.getDate());

        zile.push({
          dataIso: dataCurenta.toLocaleDateString('en-CA'),
          ziScurt: ZILE_SCURT[dataCurenta.getDay()],
          dataText: dataCurenta.getDate() + ' ' + LUNI[dataCurenta.getMonth()],
          lunaCheie: dataCurenta.getFullYear() + '-' + dataCurenta.getMonth(),
          lunaIndex: dataCurenta.getMonth()
        });
      }

      return zile;
    }

    function getLuniDisponibile() {
      const toateZilele = getToateZilele90();
      const luni = [];

      toateZilele.forEach(function(zi) {
        const exista = luni.some(function(luna) {
          return luna.cheie === zi.lunaCheie;
        });

        if (!exista) {
          luni.push({
            cheie: zi.lunaCheie,
            nume: LUNI_BUTOANE[zi.lunaIndex]
          });
        }
      });

      return luni;
    }

    function getDays() {
      const toateZilele = getToateZilele90();
      const luni = getLuniDisponibile();

      if (!luni[lunaSelectataOffset]) {
        lunaSelectataOffset = 0;
      }

      const lunaAleasa = luni[lunaSelectataOffset];

      return toateZilele.filter(function(zi) {
        return zi.lunaCheie === lunaAleasa.cheie;
      });
    }

    function seteazaButoaneLuni() {
      const container = document.getElementById('monthButtons');
      if (!container) return;

      const luni = getLuniDisponibile();
      let html = '';

      luni.forEach(function(luna, index) {
        const clasa = index === lunaSelectataOffset ? 'month-btn active' : 'month-btn';
        html += '<button class="' + clasa + '" onclick="schimbaLuna(' + index + ')">' + luna.nume + '</button>';
      });

      container.innerHTML = html;
    }

    function schimbaLuna(index) {
      lunaSelectataOffset = index;
      renderOrar();
      reseteazaScrollOrar();
    }

    function pad(num) {
      return String(num).padStart(2, '0');
    }

    function minuteToText(totalMinute) {
      const h = Math.floor(totalMinute / 60);
      const m = totalMinute % 60;
      return pad(h) + ':' + pad(m);
    }

    function getSlots() {
      const slots = [];
      const start = ORA_START * 60;
      const end = ORA_FINAL * 60;

      for (let t = start; t < end; t += DURATA_SLOT) {
        slots.push({
          startMinute: t,
          endMinute: t + DURATA_SLOT,
          oraStart: minuteToText(t),
          oraFinal: minuteToText(t + DURATA_SLOT),
          text: minuteToText(t) + '-' + minuteToText(t + DURATA_SLOT)
        });
      }

      return slots;
    }

    async function getProgramari() {
      try {
        let rezultat = [];

        const { data, error } = await supabaseClient
          .from('programari')
          .select('*')
          .neq('status', 'stearsa');

        if (error) {
          console.log('EROARE SUPABASE ORAR:', error);
        } else {
          rezultat = rezultat.concat((data || []).map(function(p) {
            return {
              zi: { dataIso: p.data },
              interval: p.ora_start + '-' + p.ora_final,
              oraStart: p.ora_start,
              text: p.nume_client || 'Ocupat'
            };
          }));
        }

        const { data: indisponibilitati, error: errorIndisponibilitati } = await supabaseClient
          .from('indisponibilitati')
          .select('tip, data_start, data_final, ora_start, ora_final, mesaj, activa')
          .eq('activa', true);

        if (errorIndisponibilitati) {
          console.log('EROARE SUPABASE INDISPONIBILITATI ORAR:', errorIndisponibilitati);
        } else {
          (indisponibilitati || []).forEach(function(blocare) {
            if (!blocare || !blocare.data_start || !blocare.data_final) return;

            if (blocare.tip === 'interval') {
              rezultat.push({
                zi: { dataIso: blocare.data_start },
                interval: blocare.ora_start + '-' + blocare.ora_final,
                text: blocare.mesaj || 'Închis'
              });
            }

            if (blocare.tip === 'zi') {
              rezultat.push({
                zi: { dataIso: blocare.data_start },
                interval: '08:00-22:00',
                text: blocare.mesaj || 'Închis'
              });
            }

            if (blocare.tip === 'concediu') {
              const start = new Date(blocare.data_start);
              const final = new Date(blocare.data_final);

              for (let d = new Date(start); d <= final; d.setDate(d.getDate() + 1)) {
                const iso = new Date(d.getFullYear(), d.getMonth(), d.getDate()).toLocaleDateString('en-CA');

                rezultat.push({
                  zi: { dataIso: iso },
                  interval: '08:00-22:00',
                  text: blocare.mesaj || 'Concediu'
                });
              }
            }
          });
        }

        return rezultat;
      } catch(e) {
        console.log('EROARE SUPABASE ORAR:', e);
        return [];
      }
    }

    function intervalToMinutes(interval) {
      if (!interval || interval.indexOf('-') === -1) return null;

      const parti = interval.split('-');
      const start = parti[0].trim().split(':');
      const end = parti[1].trim().split(':');

      if (start.length < 2 || end.length < 2) return null;

      return {
        startMinute: Number(start[0]) * 60 + Number(start[1]),
        endMinute: Number(end[0]) * 60 + Number(end[1])
      };
    }

    function getBlocarePentruSlot(dataIso, slot, programari) {
      return programari.find(function(p) {
        if (!p || !p.zi || !p.zi.dataIso || !p.interval) return false;
        if (p.zi.dataIso !== dataIso) return false;

        const interval = intervalToMinutes(p.interval);
        if (!interval) return false;

        return slot.startMinute < interval.endMinute && slot.endMinute > interval.startMinute;
      });
    }

    function esteProgramareInceputa(dataIso, blocare) {
      if (!blocare || !blocare.oraStart) return false;

      const acum = new Date();
      const aziIso = new Date(acum.getFullYear(), acum.getMonth(), acum.getDate()).toLocaleDateString('en-CA');

      if (dataIso !== aziIso) return false;

      const partiOra = blocare.oraStart.split(':');
      if (partiOra.length < 2) return false;

      const dataInceput = new Date(dataIso);
      dataInceput.setHours(Number(partiOra[0]), Number(partiOra[1]), 0, 0);

      return acum > dataInceput;
    }

    function esteSelectieTemporara(dataIso, oraStart) {
      return selectiiTemporare.some(function(s) {
        return s.dataIso === dataIso && s.oraStart === oraStart;
      });
    }

    function toggleSelectieTemporara(dataIso, ziText, oraStart, oraFinal) {
      if (!clientSelectat) {
        afiseazaMesaj('Selectează mai întâi clientul.', 'error');
        return;
      }

      const index = selectiiTemporare.findIndex(function(s) {
        return s.dataIso === dataIso && s.oraStart === oraStart;
      });

      if (index !== -1) {
        selectiiTemporare.splice(index, 1);
        afiseazaMesaj('Rezervarea temporară a fost scoasă.', 'ok');
      } else {
        selectiiTemporare.push({
          dataIso: dataIso,
          ziText: ziText,
          oraStart: oraStart,
          oraFinal: oraFinal
        });
        afiseazaMesaj('Rezervat temporar: ' + ziText + ' ' + oraStart + '-' + oraFinal, 'ok');
      }

      renderOrar();
    }

    async function renderOrar() {
      const grid = document.getElementById('orarGrid');
      const zile = getDays();
      const slots = getSlots();
      const programari = await getProgramari();

      seteazaButoaneLuni();
      grid.style.gridTemplateColumns = '74px repeat(' + zile.length + ', 76px)';
      grid.style.minWidth = (74 + (zile.length * 76)) + 'px';

      let html = '';

      html += '<div class="cell head-cell hour-cell col-sep">Ora</div>';

      zile.forEach(function(zi) {
        html += `
          <div class="cell head-cell">
            <div class="day-name">${zi.ziScurt}</div>
            <div class="day-date">${zi.dataText}</div>
          </div>
        `;
      });

      slots.forEach(function(slot) {
        html += `<div class="cell hour-cell col-sep">${slot.text}</div>`;

        zile.forEach(function(zi) {
          const blocare = getBlocarePentruSlot(zi.dataIso, slot, programari);
          const ocupat = !!blocare;
          const programareInceputa = ocupat && esteProgramareInceputa(zi.dataIso, blocare);
          const rezervat = esteSelectieTemporara(zi.dataIso, slot.oraStart);

          if (ocupat) {
            const clasaCelula = programareInceputa ? 'busy-past' : 'busy';
            const textCelula = blocare.text || 'Ocupat';
            html += `<div class="cell ${clasaCelula}"><div class="slot-text">${escapeHtml(textCelula)}</div></div>`;
          } else if (rezervat) {
            html += `<div class="cell reserved" data-date="${zi.dataIso}" data-hour="${slot.oraStart}" onclick="toggleSelectieTemporara('${zi.dataIso}', '${zi.ziScurt} ${zi.dataText}', '${slot.oraStart}', '${slot.oraFinal}')"><div class="slot-text">Rezervat</div></div>`;
          } else {
            html += `<div class="cell free" data-date="${zi.dataIso}" data-hour="${slot.oraStart}" onclick="toggleSelectieTemporara('${zi.dataIso}', '${zi.ziScurt} ${zi.dataText}', '${slot.oraStart}', '${slot.oraFinal}')"><div class="slot-text">Liber</div></div>`;
          }
        });
      });

      grid.innerHTML = html;
    }

    function scrollLaSelectie(dataIso, oraStart) {
      setTimeout(function() {
        const wrapper = document.querySelector('.orar-wrapper');
        if (!wrapper) return;

        const celule = document.querySelectorAll('[data-date][data-hour]');
        let celula = null;

        celule.forEach(function(el) {
          if (el.getAttribute('data-date') === dataIso && el.getAttribute('data-hour') === oraStart) {
            celula = el;
          }
        });

        if (!celula) return;

        const left = celula.offsetLeft - wrapper.clientWidth / 2 + celula.clientWidth / 2;
        const top = celula.offsetTop - wrapper.clientHeight / 2 + celula.clientHeight / 2;

        wrapper.scrollLeft = left > 0 ? left : 0;
        wrapper.scrollTop = top > 0 ? top : 0;
      }, 500);
    }

    function reseteazaScrollOrar() {
      setTimeout(function() {
        const wrapper = document.querySelector('.orar-wrapper');
        if (!wrapper) return;

        wrapper.scrollLeft = 0;
        wrapper.scrollTop = 0;
      }, 250);
    }

    function gataSelectii() {
      if (!clientSelectat) {
        afiseazaMesaj('Selectează mai întâi clientul.', 'error');
        return;
      }

      if (!selectiiTemporare.length) {
        afiseazaMesaj('Nu ai selectat nicio rezervare.', 'error');
        return;
      }

      selectiiTemporare.sort(function(a, b) {
        return (a.dataIso + ' ' + a.oraStart).localeCompare(b.dataIso + ' ' + b.oraStart);
      });

      const overlay = document.getElementById('confirmOverlay');
      const list = document.getElementById('confirmList');
      const client = document.getElementById('confirmClientName');

      if (!overlay || !list || !client) return;

      client.innerText = clientSelectat.nume || '-';

      list.innerHTML = '';

      selectiiTemporare.forEach(function(s, index) {
        const div = document.createElement('div');
        div.className = 'confirm-item';

        div.innerHTML =
          '<div class="confirm-day">' +
          (index + 1) + '. ' + s.ziText +
          '</div>' +
          '<div class="confirm-row-bottom">' +
            '<div class="confirm-hour">' +
            s.oraStart + ' - ' + s.oraFinal +
            '</div>' +
            '<button class="modify-btn" onclick="modificaSelectie(' + index + ')">MODIFICĂ</button>' +
          '</div>';

        list.appendChild(div);
      });

      overlay.style.display = 'flex';
    }

    function inchideConfirmare() {
      const overlay = document.getElementById('confirmOverlay');
      if (overlay) {
        overlay.style.display = 'none';
      }
    }

    async function modificaSelectie(index) {
      const selectie = selectiiTemporare[index];

      if (!selectie) {
        afiseazaMesaj('Selecția nu a fost găsită.', 'error');
        inchideConfirmare();
        return;
      }

      const toateLunile = getLuniDisponibile();

      const lunaIndex = toateLunile.findIndex(function(luna) {
        return getDaysForMonthKey(luna.cheie).some(function(zi) {
          return zi.dataIso === selectie.dataIso;
        });
      });

      if (lunaIndex !== -1) {
        lunaSelectataOffset = lunaIndex;
      }

      inchideConfirmare();
      await renderOrar();
      scrollLaSelectie(selectie.dataIso, selectie.oraStart);

      afiseazaMesaj('Modifică selecția marcată Rezervat: apasă pe ea ca să o scoți, apoi alege altă oră.', 'ok');
    }

    function getDaysForMonthKey(lunaCheie) {
      return getToateZilele90().filter(function(zi) {
        return zi.lunaCheie === lunaCheie;
      });
    }

    async function confirmareFinala() {
      if (!clientSelectat) {
        afiseazaMesaj('Selectează mai întâi clientul.', 'error');
        inchideConfirmare();
        return;
      }

      if (!selectiiTemporare.length) {
        afiseazaMesaj('Nu ai selectat nicio rezervare.', 'error');
        inchideConfirmare();
        return;
      }

      selectiiTemporare.sort(function(a, b) {
        return (a.dataIso + ' ' + a.oraStart).localeCompare(b.dataIso + ' ' + b.oraStart);
      });

      const programariDeSalvat = selectiiTemporare.map(function(s) {
        return {
          nume_client: clientSelectat.nume || '',
          telefon: clientSelectat.telefon || '',
          data: s.dataIso,
          ora_start: s.oraStart,
          ora_final: s.oraFinal,
          status: 'noua',
          reminder_trimis: false,
          confirmare_trimisa: false
        };
      });

      try {
        const { error } = await supabaseClient
          .from('programari')
          .insert(programariDeSalvat);

        if (error) {
          console.log('EROARE SALVARE PROGRAMARI MULTIPLE:', error);
          afiseazaMesaj('Eroare la salvarea programărilor.', 'error');
          inchideConfirmare();
          return;
        }

        const nr = selectiiTemporare.length;

        /* ===== SALVARE PROGRAMARI MULTIPLE PENTRU PG4 ===== */
        const programariMultipleWhatsapp = programariDeSalvat.map(function(p) {
          return {
            ziText: p.data,
            interval: p.ora_start + ' - ' + p.ora_final
          };
        });

        localStorage.setItem('programari_multiple_whatsapp', JSON.stringify({
          client: clientSelectat,
          programari: programariMultipleWhatsapp
        }));

        /* ===== COMPATIBILITATE PG4 WHATSAPP ===== */
        localStorage.setItem('programare_rezultat', JSON.stringify({
          client: clientSelectat
        }));

        selectiiTemporare = [];
        inchideConfirmare();

        afiseazaMesaj('Programările au fost salvate: ' + nr + '.', 'ok');

        await renderOrar();

        /* ===== DESCHIDERE PAGINA 4 ===== */
        window.location.href = 'Programare_noua_premium_pg4.html';

      } catch(e) {
        console.log('EROARE SALVARE PROGRAMARI MULTIPLE:', e);
        afiseazaMesaj('Eroare la salvarea programărilor.', 'error');
        inchideConfirmare();
      }
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    loadClientsFromSupabase();
    renderOrar();
  </script>
</body>
</html>
