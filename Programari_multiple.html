<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta charset="UTF-8">
  <title>Programări multiple</title>

  <style>
    /* ===== BLOC 1 - SETĂRI GENERALE ===== */
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    /* ===== BLOC 2 - PAGINĂ ===== */
    .page {
      min-height: 100vh;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .header {
      position: relative;
      text-align: center;
      margin-bottom: 4px;
    }

    .nav-back {
      position: absolute;
      left: 0;
      top: -4px;
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .arrow {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
    }

    .back-text {
      color: #ff0000;
      font-size: 14px;
      font-weight: 900;
      margin-top: 10px;
    }

    .title {
      font-size: 24px;
      font-weight: 900;
      color: #f2c94c;
      line-height: 1.05;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 17px;
      color: #ffffff;
      font-weight: 800;
    }

    /* ===== BLOC 3 - CĂUTARE CLIENT ===== */
    .client-card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 9px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .client-label {
      font-size: 12px;
      color: #f4c363;
      font-weight: 900;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .client-input {
      width: 100%;
      height: 40px;
      border-radius: 11px;
      border: 1px solid rgba(244,195,99,0.65);
      background: #080808;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      padding: 0 12px;
      outline: none;
    }

    .client-results {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 92px;
      overflow-y: auto;
      margin-top: 7px;
    }

    .client-result-card {
      border: 1px solid rgba(244,195,99,0.75);
      border-radius: 11px;
      background: linear-gradient(145deg, #1a1a1a, #070707);
      padding: 8px 9px;
      color: white;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }

    .client-result-name {
      font-size: 14px;
      font-weight: 900;
      line-height: 1.1;
    }

    .client-result-phone {
      font-size: 11px;
      color: #f4c363;
      font-weight: 900;
      white-space: nowrap;
    }

    .client-selected-box {
      margin-top: 6px;
      border: 1px solid rgba(244,195,99,0.85);
      border-radius: 11px;
      padding: 6px 8px;
      background: linear-gradient(145deg, #3a2a08, #090909);
      color: white;
    }

    .client-selected-title {
      text-align: center;
      font-size: 9px;
      color: #f4c363;
      font-weight: 900;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .client-selected-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .client-selected-name {
      flex: 1;
      min-width: 0;
      text-align: left;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.05;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .client-selected-phone {
      flex-shrink: 0;
      text-align: right;
      font-size: 11px;
      color: #f4c363;
      font-weight: 900;
      line-height: 1.05;
      white-space: nowrap;
    }

    /* ===== BLOC 4 - ZONA PROGRAMĂRI MULTIPLE - DEOCAMDATĂ STRUCTURĂ ===== */
    .multi-card {
      border: 1px solid rgba(244,195,99,0.65);
      border-radius: 14px;
      padding: 12px;
      background: rgba(12, 24, 38, 0.78);
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-height: 180px;
    }

    .multi-title {
      color: #f4c363;
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .multi-info {
      color: rgba(255,255,255,0.78);
      font-size: 13px;
      line-height: 1.25;
      font-weight: 800;
    }

    .row-placeholder {
      border: 1px dashed rgba(244,195,99,0.65);
      border-radius: 12px;
      padding: 12px;
      color: #f4c363;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      background: rgba(0,0,0,0.22);
    }

    /* ===== BLOC 5 - BUTOANE JOS ===== */
    .bottom-bar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: auto;
    }

    .box-btn {
      flex: 1;
      height: 48px;
      border-radius: 13px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: #111;
      cursor: pointer;
      border: none;
    }

    .box-btn.secondary {
      background: linear-gradient(145deg, #1a1a1a, #070707);
      color: #f2c94c;
      border: 1px solid #f2c94c;
    }

    /* ===== BLOC 6 - DESKTOP SIMULARE TELEFON ===== */
    @media (min-width: 701px) {
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
        background: #000000;
      }

      .page {
        position: relative;
        width: 430px;
        max-width: 430px;
        height: 920px;
        min-height: 920px;
        max-height: 920px;
        margin: 0 auto;
        border-radius: 48px;
        padding: 74px 16px 18px;
        background:
          linear-gradient(180deg, rgba(18,18,18,0.98) 0%, rgba(7,7,7,0.98) 100%);
        border: 3px solid rgba(242,201,76,0.92);
        box-shadow:
          0 0 0 3px rgba(255,255,255,0.05),
          0 0 0 12px #000000,
          0 0 35px rgba(242,201,76,0.30),
          0 45px 90px rgba(0,0,0,0.85);
        overflow: hidden;
        transform-origin: center center;
        transform: scale(min(calc((100vw - 80px) / 430), calc((100vh - 80px) / 920)));
        gap: 10px;
      }

      .page::before {
        content: "";
        position: absolute;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        width: 170px;
        height: 35px;
        background: #000000;
        border-radius: 28px;
        z-index: 5;
      }

      .page::after {
        content: "";
        position: absolute;
        top: 36px;
        left: 50%;
        transform: translateX(-50%);
        width: 58px;
        height: 7px;
        background: #222222;
        border-radius: 20px;
        z-index: 6;
      }
    }
  </style>

  <!-- ===== BLOC 7 - CONECTARE SUPABASE ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseClient = window.supabase.createClient(
      'https://ksdcstrnsnqvqyyitcol.supabase.co',
      'sb_publishable_TDzH5gP2zi9jwmUVLlWrQA_p4TiPTZ_'
    );
  </script>
</head>

<body>
  <div class="page">

    <!-- ===== BLOC HTML 1 - HEADER ===== -->
    <div class="header">
      <div class="nav-back" onclick="goHome()">
        <div class="arrow">«</div>
        <div class="back-text">BACK</div>
      </div>
      <div class="title">Programări multiple</div>
      <div class="subtitle">Alege clientul</div>
    </div>

    <!-- ===== BLOC HTML 2 - CLIENT ===== -->
    <div class="client-card">
      <div class="client-label">Caută client</div>
      <input id="clientSearch" class="client-input" placeholder="Ex: Cris" oninput="searchClients()">
      <div id="clientResults" class="client-results"></div>

      <div class="client-selected-box">
        <div class="client-selected-title">CLIENT SELECTAT</div>
        <div class="client-selected-row">
          <div class="client-selected-name" id="clientName">-</div>
          <div class="client-selected-phone" id="clientPhone">-</div>
        </div>
      </div>
    </div>

    <!-- ===== BLOC HTML 3 - PROGRAMĂRI MULTIPLE ===== -->
    <div class="multi-card">
      <div class="multi-title">Programări de planificat</div>
      <div class="multi-info">
        Aici vom adăuga rânduri cu zi și oră. Butonul More va crea rânduri noi.
      </div>
      <div class="row-placeholder">Rând 1: zi + oră liberă</div>
    </div>

    <!-- ===== BLOC HTML 4 - BUTOANE ===== -->
    <div class="bottom-bar">
      <button class="box-btn secondary" onclick="goHome()">HOME</button>
      <button class="box-btn" onclick="mesajPasUrmator()">MORE</button>
      <button class="box-btn" onclick="mesajPasUrmator()">PLANIFICĂ</button>
    </div>

  </div>

  <script>
    /* ===== BLOC 8 - VARIABILE CLIENT ===== */
    let clientSelectat = null;
    let clienti = [];

    /* ===== BLOC 9 - CITIRE CLIENȚI DIN SUPABASE ===== */
    async function loadClientsFromSupabase() {
      try {
        const { data, error } = await supabaseClient
          .from('clienti')
          .select('id, nume, telefon')
          .order('nume', { ascending: true });

        if (error) {
          console.log('EROARE CLIENTI SUPABASE:', error);
          clienti = [];
          return;
        }

        clienti = data || [];
      } catch(e) {
        console.log('EROARE INCARCARE CLIENTI:', e);
        clienti = [];
      }
    }

    /* ===== BLOC 10 - CĂUTARE CLIENT ===== */
    function searchClients() {
      const input = document.getElementById('clientSearch');
      const box = document.getElementById('clientResults');
      if (!input || !box) return;

      const text = input.value.toLowerCase().trim();
      box.innerHTML = '';

      if (text.length < 2) return;

      const gasiti = clienti.filter(function(c) {
        return (c.nume || '').toLowerCase().includes(text);
      }).slice(0, 8);

      gasiti.forEach(function(c) {
        const div = document.createElement('div');
        div.className = 'client-result-card';
        div.onclick = function() {
          selectClient(c);
        };

        div.innerHTML =
          '<div class="client-result-name">' + (c.nume || '') + '</div>' +
          '<div class="client-result-phone">' + (c.telefon || '') + '</div>';

        box.appendChild(div);
      });
    }

    /* ===== BLOC 11 - SELECTARE CLIENT ===== */
    function selectClient(c) {
      clientSelectat = c;

      document.getElementById('clientName').textContent = c && c.nume ? c.nume : '-';
      document.getElementById('clientPhone').textContent = c && c.telefon ? c.telefon : '-';

      const box = document.getElementById('clientResults');
      const input = document.getElementById('clientSearch');

      if (box) box.innerHTML = '';
      if (input) input.value = '';
    }

    /* ===== BLOC 12 - BUTOANE TEMPORARE ===== */
    function mesajPasUrmator() {
      alert('Pasul următor: adăugăm rânduri cu zi și oră.');
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }

    /* ===== BLOC 13 - PORNIRE PAGINĂ ===== */
    loadClientsFromSupabase();
  </script>
</body>
</html>
